<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaign Portal - Kapruka</title>
  <link rel="icon" type="image/png" href="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── PAGE-SPECIFIC OVERRIDES ── */
    body {
      background: var(--bg);
      padding: 40px 24px;
    }

    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .kapruka-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border-strong);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    /* ===== MONTH GRID ===== */
    .month-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .month-btn {
      padding: 18px 16px;
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      background: var(--surface);
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-muted);
      text-align: center;
      transition: border-color 0.15s, transform 0.15s;
    }

    .month-btn:hover {
      border-color: var(--gold-border);
      color: var(--text);
      transform: translateY(-2px);
    }

    .month-btn.selected {
      background: var(--purple);
      color: white;
      border-color: var(--purple);
    }

    /* ===== DEPT CARD ===== */
    .dept-container { display: none; }

    .dept-card {
      background: var(--surface);
      padding: 28px;
      border-radius: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
    }

    .dept-card:hover {
      border-left-color: var(--purple);
    }

    .dept-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .dept-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .dept-meta { display: flex; gap: 12px; flex-wrap: wrap; }

    .dept-meta > div {
      background: var(--surface2);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .meta-value {
      color: var(--purple);
      font-weight: 700;
      margin-left: 4px;
    }

    /* ===== SLOT GRID ===== */
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }

    .slot {
      aspect-ratio: 1;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s;
      font-weight: 600;
      padding: 8px;
    }

    .slot-num { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .slot-label { font-size: 9px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.06em; }

    .slot.available {
      background: var(--green-bg);
      color: var(--green);
      border-color: rgba(22,163,74,0.25);
    }
    .slot.available:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(22,163,74,0.2);
    }

    .slot.submitted {
      background: var(--purple-light);
      color: var(--purple);
      border-color: rgba(94,58,142,0.2);
    }

    .slot.working {
      background: var(--amber-bg);
      color: var(--amber);
      border-color: rgba(180,83,9,0.2);
    }

    .slot.live {
      background: #dbeafe;
      color: #1d4ed8;
      border-color: rgba(29,78,216,0.2);
    }

    .slot.completed {
      background: var(--surface2);
      color: var(--text-muted);
      border-color: var(--border);
    }

    .slot.selected {
      background: var(--gold-bg);
      color: var(--purple);
      border-color: var(--gold);
      transform: scale(1.08);
      box-shadow: 0 8px 24px rgba(201,162,39,0.35);
    }

    .slot-details {
      font-size: 9px;
      margin-top: 4px;
      line-height: 1.3;
      font-weight: 500;
      text-align: center;
      opacity: 0.8;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ===== FORM ===== */
    .form-card { display: none; }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ===== DETAIL ROW ===== */
    .detail-row {
      text-align: left;
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: 10px;
      margin: 10px 0;
      border-left: 3px solid var(--purple);
    }

    .detail-row strong {
      color: var(--text-muted);
      display: block;
      margin-bottom: 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    /* ===== LOCK BANNER ===== */
    #lockBanner {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--red);
      color: white;
      padding: 12px 28px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(220,38,38,0.3);
      z-index: 9998;
      font-weight: 600;
      font-size: 14px;
      text-align: center;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      body { padding: 20px 16px; }
      .dept-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .slot-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
      .date-row { grid-template-columns: 1fr; }
      .month-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading"><div class="spinner"></div></div>
  <div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

  <div class="container">
    <div class="header">
      <div class="kapruka-logo">
        <img src="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw" alt="Kapruka">
      </div>
      <h1>Campaign Portal</h1>
      <p class="subtitle">Kapruka Holdings PLC</p>
    </div>

    <div class="card">
      <h2>📅 Select Campaign Month</h2>
      <div class="month-grid" id="monthGrid">
        <div style="text-align:center;padding:40px;color:var(--text-muted);grid-column:1/-1;">Loading...</div>
      </div>
    </div>

    <div class="dept-container" id="deptContainer"></div>

    <div class="card form-card" id="formCard">
      <h2>✨ Campaign Details</h2>
      <form id="campaignForm">
        <div class="form-group">
          <label>📝 Campaign Details <span class="required">*</span></label>
          <textarea id="campaign" required placeholder="Describe your campaign..."></textarea>
        </div>
        <div class="form-group">
          <label>⏱️ Duration (days)</label>
          <input type="number" id="duration" value="7" min="1" max="31" required>
        </div>
        <div class="form-group">
          <label>📅 Campaign Period</label>
          <div class="date-row">
            <input type="date" id="startDate" required>
            <input type="date" id="endDate" required readonly style="background:var(--surface2);">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">🚀 Submit Request</button>
      </form>
    </div>
  </div>

  <script src="js/supabase-api.js"></script>
  <script>
    let selectedMonth = null;
    let selectedDept = null;
    let selectedSlot = null;
    let selectedElement = null;

    function showLoading() {
      document.getElementById('loading').classList.add('show');
    }

    function hideLoading() {
      document.getElementById('loading').classList.remove('show');
    }

    function calcEndDate() {
      const start = document.getElementById('startDate').value;
      const duration = parseInt(document.getElementById('duration').value);
      if (start && duration) {
        const end = new Date(start);
        end.setDate(end.getDate() + duration);
        document.getElementById('endDate').value = end.toISOString().split('T')[0];
      }
    }

    document.getElementById('startDate').addEventListener('change', calcEndDate);
    document.getElementById('duration').addEventListener('change', calcEndDate);

    async function loadInitialData() {
      try {
        showLoading();
        const data = await getInitialData();

        if (data && data.months && data.months.length > 0) {
          displayMonths(data.months);
          if (data.currentMonth && data.months.includes(data.currentMonth)) {
            setTimeout(() => selectMonth(data.currentMonth), 500);
          }
        } else {
          document.getElementById('monthGrid').innerHTML = 
            '<div style="text-align:center;padding:40px;color:var(--text-muted);grid-column:1/-1;">No active months yet.</div>';
        }
        hideLoading();
      } catch (error) {
        hideLoading();
        document.getElementById('monthGrid').innerHTML = 
          '<div style="text-align:center;padding:40px;color:var(--red);grid-column:1/-1;">Error: ' + error.message + '</div>';
      }
    }

    function displayMonths(months) {
      const grid = document.getElementById('monthGrid');
      grid.innerHTML = '';
      months.forEach(m => {
        const btn = document.createElement('div');
        btn.className = 'month-btn';
        btn.textContent = m;
        btn.onclick = () => selectMonth(m);
        grid.appendChild(btn);
      });
    }

    async function selectMonth(month) {
      selectedMonth = month;
      selectedDept = null;
      selectedSlot = null;
      selectedElement = null;
      document.getElementById('formCard').style.display = 'none';

      document.querySelectorAll('.month-btn').forEach(b => {
        b.classList.toggle('selected', b.textContent === month);
      });

      try {
        showLoading();
        const depts = await getSlotsForMonth(month);
        displayDepts(depts);
        hideLoading();
      } catch (error) {
        hideLoading();
        alert('Error loading departments: ' + error.message);
      }
    }

    function displayDepts(depts) {
      const container = document.getElementById('deptContainer');
      container.innerHTML = '';

      if (!depts || depts.length === 0) {
        container.innerHTML = '<div class="card"><p style="text-align:center;padding:40px;color:var(--text-muted);">No departments for this month.</p></div>';
        container.style.display = 'block';
        return;
      }

      depts.forEach(dept => {
        const available = dept.slots.filter(s => s.available).length;
        const card = document.createElement('div');
        card.className = 'dept-card';
        card.innerHTML = `
          <div class="dept-header">
            <div class="dept-name">${dept.department}</div>
            <div class="dept-meta">
              <div>💰 Budget: <span class="meta-value">$${dept.budget}k</span></div>
              <div>🎰 Available: <span class="meta-value">${available}/${dept.totalSlots}</span></div>
            </div>
          </div>
          <div class="slot-grid" id="grid-${dept.department.replace(/\s+/g,'-')}"></div>
        `;
        container.appendChild(card);

        const grid = document.getElementById(`grid-${dept.department.replace(/\s+/g,'-')}`);
        dept.slots.forEach(slot => {
          const div = document.createElement('div');

          if (slot.available) {
            div.className = 'slot available';
            div.innerHTML = `<div class="slot-num">${slot.number}</div><div class="slot-label">Available</div>`;
            div.onclick = () => pickSlot(dept.department, slot.name, div);
          } else {
            const status = slot.details.status;
            let slotClass = 'working';
            if (status === 'Request Submitted') slotClass = 'submitted';
            else if (status === 'Working') slotClass = 'working';
            else if (status === 'Live') slotClass = 'live';
            else if (status === 'Completed') slotClass = 'completed';

            div.className = 'slot ' + slotClass;
            div.innerHTML = `
              <div class="slot-num">${slot.number}</div>
              <div class="slot-label">${status.substring(0,10)}</div>
              <div class="slot-details">${slot.details.campaign.substring(0,20)}</div>
            `;
            div.onclick = () => showDetails(slot.details);
          }
          grid.appendChild(div);
        });
      });

      container.style.display = 'block';
    }

    function pickSlot(dept, slotName, element) {
      if (selectedElement && selectedElement !== element) {
        selectedElement.classList.remove('selected');
        selectedElement.classList.add('available');
        selectedElement.querySelector('.slot-label').textContent = 'Available';
      }

      if (element.classList.contains('selected')) {
        element.classList.remove('selected');
        element.classList.add('available');
        element.querySelector('.slot-label').textContent = 'Available';
        selectedDept = null; selectedSlot = null; selectedElement = null;
        document.getElementById('formCard').style.display = 'none';
      } else {
        element.classList.remove('available');
        element.classList.add('selected');
        element.querySelector('.slot-label').textContent = 'Selected';
        selectedDept = dept; selectedSlot = slotName; selectedElement = element;
        document.getElementById('formCard').style.display = 'block';
        document.getElementById('formCard').scrollIntoView({behavior: 'smooth'});
      }
    }

    function showDetails(details) {
      document.getElementById('modalContent').innerHTML = `
        <div class="modal-icon">📋</div>
        <h2>Slot Details</h2>
        <p></p>
        <div class="detail-row"><strong>Request ID</strong><span>${details.requestId}</span></div>
        <div class="detail-row"><strong>Campaign</strong><span>${details.campaign}</span></div>
        <div class="detail-row"><strong>Status</strong><span>${details.status}</span></div>
        <div class="detail-row"><strong>Requestor</strong><span>${details.requestor}</span></div>
        <div class="detail-row"><strong>Period</strong><span>${details.startDate} to ${details.endDate}</span></div>
        <button class="modal-btn" onclick="closeModal()">Close</button>
      `;
      document.getElementById('modal').classList.add('show');
    }

    document.getElementById('campaignForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedDept || !selectedSlot) { alert('Please select a slot first'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Submitting...';
      showLoading();

      try {
        const formData = {
          department: selectedDept,
          month: selectedMonth,
          slot: selectedSlot,
          campaign: document.getElementById('campaign').value,
          duration: document.getElementById('duration').value,
          startDate: document.getElementById('startDate').value,
          endDate: document.getElementById('endDate').value
        };

        const result = await submitCampaignRequest(formData);
        btn.disabled = false;
        btn.textContent = '🚀 Submit Request';
        hideLoading();

        document.getElementById('modalContent').innerHTML = `
          <div class="modal-icon">✓</div>
          <h2>Success!</h2>
          <p>Campaign request submitted successfully.</p>
          <div class="mono" style="background:var(--surface2);padding:12px;border-radius:8px;margin:16px 0;font-size:14px;">${result.requestId}</div>
          <button class="modal-btn" onclick="closeSuccess()">Close</button>
        `;
        document.getElementById('modal').classList.add('show');
        document.getElementById('campaignForm').reset();
        document.getElementById('formCard').style.display = 'none';

      } catch (error) {
        btn.disabled = false;
        btn.textContent = '🚀 Submit Request';
        hideLoading();
        alert('Error: ' + error.message);
        selectMonth(selectedMonth);
      }
    });

    function closeSuccess() {
      document.getElementById('modal').classList.remove('show');
      if (selectedMonth) { showLoading(); setTimeout(() => selectMonth(selectedMonth), 300); }
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    window.onload = loadInitialData;

    // ===== MONTHLY LOCK SYSTEM =====
    function isCurrentMonthLocked() {
      const today = new Date();
      if (today.getDate() <= 25) return false;
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return selectedMonth === `${months[today.getMonth()]} ${today.getFullYear()}`;
    }

    function showLockMessage() {
      const today = new Date();
      if (today.getDate() <= 25) return;
      let banner = document.getElementById('lockBanner');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'lockBanner';
        document.body.appendChild(banner);
      }
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const currentMonthString = `${months[today.getMonth()]} ${today.getFullYear()}`;
      banner.textContent = `🔒 ${currentMonthString} booking is closed — reopens on the 1st`;
    }

    const originalPickSlot = pickSlot;
    pickSlot = function(dept, slotName, element) {
      if (isCurrentMonthLocked()) {
        alert('🔒 Booking is closed after the 25th. Please select a future month or wait until the 1st.');
        return;
      }
      originalPickSlot(dept, slotName, element);
    };

    document.getElementById('campaignForm').addEventListener('submit', function(e) {
      if (isCurrentMonthLocked()) {
        e.preventDefault();
        e.stopImmediatePropagation();
        alert('🔒 Booking is closed after the 25th.');
        return false;
      }
    }, true);

    const originalSelectMonth = selectMonth;
    selectMonth = async function(month) {
      await originalSelectMonth(month);
      const banner = document.getElementById('lockBanner');
      if (banner) banner.remove();
      const today = new Date();
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      if (today.getDate() > 25 && month === `${months[today.getMonth()]} ${today.getFullYear()}`) {
        showLockMessage();
      }
    };

    window.addEventListener('load', function() {
      if (new Date().getDate() > 25) showLockMessage();
    });
  </script>
</body>
</html>
