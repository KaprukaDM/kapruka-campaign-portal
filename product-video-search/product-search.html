<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Video Search – Kapruka</title>
<link rel="stylesheet" href="styles.css">
<style>
  .upload-zone {
    border: 2px dashed #d2d2d7;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: #fafafa;
  }
  .upload-zone:hover, .upload-zone.drag {
    border-color: #5e3a8e;
    background: #f5f0fc;
  }
  .upload-zone .icon { font-size: 40px; margin-bottom: 12px; }
  .upload-zone p { color: #6e6e73; font-size: 14px; }
  .upload-zone img#preview {
    max-height: 200px;
    max-width: 100%;
    border-radius: 8px;
    margin-top: 16px;
    display: none;
  }
  #file-input { display: none; }

  .attrs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .badge {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 99px;
    font-weight: 500;
  }
  .badge.brand    { background: #ede7f6; color: #4a148c; }
  .badge.model    { background: #e8f5e9; color: #1b5e20; }
  .badge.cat      { background: #fff8e1; color: #e65100; }
  .badge.feature  { background: #f3f4f6; color: #374151; }

  .platform-section { margin-bottom: 28px; }
  .platform-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #f0f0f0;
  }

  .result-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 10px;
    background: #fafafa;
    border: 1px solid #f0f0f0;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
  }
  .result-item:hover {
    background: #f5f0fc;
    border-color: #ce93d8;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(94,58,142,0.1);
  }
  .result-item .thumb {
    width: 90px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    background: #e5e7eb;
  }
  .result-item .thumb-placeholder {
    width: 90px;
    height: 60px;
    border-radius: 6px;
    background: #ede7f6;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  .result-item .info .title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
    color: #1d1d1f;
  }
  .result-item .info .snippet {
    font-size: 12px;
    color: #6e6e73;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .result-item .info .url-tag {
    font-size: 11px;
    color: #5e3a8e;
    margin-top: 4px;
    opacity: 0.7;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: #6e6e73;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  .summary-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #f0f0f0;
  }
  .summary-bar span { font-size: 14px; color: #6e6e73; }
  .summary-bar strong { color: #1d1d1f; }
</style>
</head>
<body>
<div class="page-container">

  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <div class="header-logo">
        <img src="https://kapruka.com/images/kapruka_logo.png" onerror="this.style.display='none'" alt="Kapruka">
      </div>
      <h1>Product Video Search</h1>
    </div>
    <a href="index.html" class="back-btn">← Back</a>
  </div>

  <!-- Search Card -->
  <div class="card">
    <h2>Find Product Videos</h2>
    <p style="color:#6e6e73;font-size:14px;margin-bottom:24px;">Upload a product image and enter its name to find matching videos across TikTok, Pinterest, Amazon, Alibaba and Temu.</p>

    <div class="form-group">
      <label>Product Image <span class="required">*</span></label>
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <div id="placeholder">
          <div class="icon">📷</div>
          <p>Click or drag & drop a product image here</p>
          <p style="margin-top:6px;font-size:12px;color:#aaa;">JPG, PNG, WEBP supported</p>
        </div>
        <img id="preview">
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])">
    </div>

    <div class="form-group">
      <label>Product Name <span class="required">*</span></label>
      <input type="text" id="product-name" placeholder="e.g. Sony WH-1000XM5 Headphones">
    </div>

    <button class="btn btn-primary" id="search-btn" onclick="doSearch()">🔍 Search for Videos</button>
  </div>

  <!-- Results -->
  <div id="output"></div>

</div>

<!-- Loading overlay -->
<div class="loading" id="loading">
  <div style="text-align:center">
    <div class="spinner"></div>
    <p style="color:white;margin-top:20px;font-size:15px;" id="loading-msg">Analyzing image with AI...</p>
  </div>
</div>

<script>
const ICONS = { TikTok:'🎵', Pinterest:'📌', Amazon:'📦', Alibaba:'🏪', Temu:'🛍️' };
const MSGS  = [
  'Analyzing image with AI...',
  'Building search queries...',
  'Searching TikTok...',
  'Searching Pinterest...',
  'Searching Amazon...',
  'Searching Alibaba & Temu...',
  'Ranking results...'
];
let selectedFile = null;
let msgTimer = null;

// Drag & drop
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag');
  handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('preview');
    preview.src = e.target.result;
    preview.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function showLoading() {
  document.getElementById('loading').classList.add('show');
  let i = 0;
  msgTimer = setInterval(() => {
    i = (i + 1) % MSGS.length;
    document.getElementById('loading-msg').textContent = MSGS[i];
  }, 2500);
}

function hideLoading() {
  document.getElementById('loading').classList.remove('show');
  clearInterval(msgTimer);
}

async function doSearch() {
  const name = document.getElementById('product-name').value.trim();
  if (!selectedFile) return alert('Please upload a product image.');
  if (!name)         return alert('Please enter a product name.');

  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  showLoading();
  document.getElementById('output').innerHTML = '';

  const form = new FormData();
  form.append('image', selectedFile);
  form.append('product_name', name);

  try {
    const res = await fetch('https://kapruka-campaign-portal.onrender.com/search', {
      method: 'POST', body: form
    });
    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
    renderResults(await res.json());
  } catch (err) {
    document.getElementById('output').innerHTML = `
      <div class="card" style="border-left:4px solid #d32f2f;">
        <p style="color:#d32f2f;font-weight:500;">❌ Error: ${err.message}</p>
      </div>`;
  } finally {
    hideLoading();
    btn.disabled = false;
  }
}

function renderResults(data) {
  const a = data.attributes;

  const badges = [
    a.brand    ? `<span class="badge brand">${a.brand}</span>`     : '',
    a.model    ? `<span class="badge model">${a.model}</span>`     : '',
    a.category ? `<span class="badge cat">${a.category}</span>`   : '',
    ...(a.key_features||[]).slice(0,3).map(f => `<span class="badge feature">${f}</span>`),
  ].filter(Boolean).join('');

  // group by platform preserving order
  const order    = ['TikTok','Pinterest','Amazon','Alibaba','Temu'];
  const grouped  = {};
  order.forEach(p => grouped[p] = []);
  data.results.forEach(r => { if (grouped[r.platform]) grouped[r.platform].push(r); });

  const platformHTML = order.map(platform => {
    const items = grouped[platform];
    if (!items.length) return '';
    return `
      <div class="platform-section">
        <div class="platform-label">${ICONS[platform]||'🔗'} ${platform} — ${items.length} result${items.length>1?'s':''}</div>
        ${items.slice(0,5).map(r => `
          <a class="result-item" href="${r.url}" target="_blank" rel="noopener">
            ${r.thumbnail
              ? `<img class="thumb" src="${r.thumbnail}" onerror="this.style.display='none'" loading="lazy">`
              : `<div class="thumb-placeholder">${ICONS[platform]||'🔗'}</div>`}
            <div class="info">
              <div class="title">${r.title || 'View product'}</div>
              ${r.snippet ? `<div class="snippet">${r.snippet}</div>` : ''}
              <div class="url-tag">${new URL(r.url).hostname}</div>
            </div>
          </a>`).join('')}
      </div>`;
  }).join('');

  document.getElementById('output').innerHTML = `
    <div class="card">
      <div class="summary-bar">
        <div class="attrs">${badges}</div>
        <span><strong>${data.total_found}</strong> results found</span>
      </div>
      ${platformHTML || '<div class="empty-state"><div class="icon">🔍</div><p>No results found. Try a more specific product name.</p></div>'}
    </div>`;
}
</script>
</body>
</html>
