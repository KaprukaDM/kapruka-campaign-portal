<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Products — Kapruka</title>
  <link rel="icon" type="image/png" href="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --bg:            #f5f4f0;
      --surface:       #fffffe;
      --surface2:      #f0ede8;
      --border:        rgba(0,0,0,0.07);
      --border-strong: rgba(0,0,0,0.16);
      --text:          #111;
      --text-muted:    #888;
      --text-faint:    #bbb;
      --purple:        #5e3a8e;
      --purple-dark:   #4a2d70;
      --purple-light:  #f3eeff;
      --purple-mid:    rgba(94,58,142,0.08);
      --gold:          #c9a227;
      --gold-bg:       #fef9ec;
      --gold-border:   rgba(201,162,39,0.35);
      --green:         #16a34a;
      --green-bg:      #dcfce7;
      --amber:         #b45309;
      --amber-bg:      #fef3c7;
      --red:           #dc2626;
      --red-bg:        #fee2e2;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    /* ── PAGE HEADER ─────────────────────────────────────────── */
    .page-header {
      background: var(--surface);
      padding: 20px 28px;
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-logo {
      width: 40px; height: 40px;
      border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .header-logo img { width: 100%; height: 100%; object-fit: cover; }
    .page-header h1 {
      font-size: 20px; font-weight: 600;
      color: var(--text); letter-spacing: -0.02em;
    }
    .page-header .subtitle {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--text-muted); margin-top: 3px;
    }
    .back-btn {
      padding: 8px 20px;
      background: var(--purple); color: white;
      border: none; border-radius: 10px; cursor: pointer;
      font-weight: 500; font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none; display: inline-block;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .back-btn:hover { opacity: 0.85; }

    /* ── CARD ───────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      padding: 28px; border-radius: 20px;
      border: 1px solid var(--border); margin-bottom: 20px;
    }
    .card h2 {
      font-size: 16px; font-weight: 600;
      color: var(--text); letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    /* ── OVERVIEW TABLE ───────────────────────────────────────── */
    .overview-table {
      width: 100%; border-collapse: collapse;
    }
    .overview-table th {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--text-muted);
      padding: 0 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .overview-table th.center { text-align: center; }
    .overview-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--text);
      vertical-align: middle;
    }
    .overview-table td.center { text-align: center; }
    .overview-table tbody tr { transition: background 0.15s; cursor: pointer; }
    .overview-table tbody tr:hover { background: var(--surface2); }
    .overview-table tbody tr.active-row { background: var(--purple-light); }
    .overview-table tbody tr:last-child td { border-bottom: none; }
    .overview-table tfoot td {
      padding: 12px;
      font-weight: 600; font-size: 12px;
      background: var(--surface2);
      color: var(--text-muted);
      border-top: 1px solid var(--border-strong);
    }
    .overview-table tfoot td.center { text-align: center; }

    /* ── BADGES ───────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 6px;
      font-weight: 700; font-size: 12px;
    }
    .badge-suggested { background: var(--purple-light); color: var(--purple); }
    .badge-fulfilled  { background: var(--green-bg);    color: var(--green); }
    .badge-pending    { background: var(--amber-bg);    color: var(--amber); }
    .badge-zero       { background: var(--surface2);    color: var(--text-faint); }

    /* ── PROGRESS BAR ────────────────────────────────────────── */
    .progress-wrap {
      width: 100%; background: var(--surface2);
      border-radius: 999px; height: 6px; overflow: hidden;
    }
    .progress-bar {
      height: 6px; border-radius: 999px;
      background: var(--purple);
      transition: width 0.5s ease;
    }

    /* ── VIEW BUTTON ─────────────────────────────────────────── */
    .view-btn {
      padding: 5px 14px; border-radius: 7px;
      border: 1px solid var(--border-strong);
      background: var(--surface); color: var(--text);
      font-weight: 500; font-size: 12px;
      cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .view-btn:hover:not(:disabled), .view-btn.active {
      background: var(--purple); color: white; border-color: var(--purple);
    }
    .view-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── SHIMMER ──────────────────────────────────────────────── */
    .shimmer {
      display: inline-block; width: 36px; height: 12px;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--bg) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px; vertical-align: middle;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── SEARCH INPUT ────────────────────────────────────────── */
    .search-input {
      padding: 9px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 9px; font-size: 13px;
      font-family: 'DM Sans', sans-serif; width: 240px;
      background: var(--surface); color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input:focus {
      outline: none; border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-mid);
    }
    .search-input::placeholder { color: var(--text-faint); }

    /* ── STATS BAR ───────────────────────────────────────────── */
    .stats-bar {
      display: flex; gap: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; margin-bottom: 16px;
      flex-wrap: wrap; align-items: stretch;
      overflow: hidden;
    }
    .stat {
      flex: 1; min-width: 140px;
      padding: 20px 24px;
      border-right: 1px solid var(--border);
    }
    .stat:last-of-type { border-right: none; }
    .stat-label {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .stat-value {
      font-size: 28px; font-weight: 300;
      font-family: 'DM Mono', monospace;
      color: var(--purple); letter-spacing: -0.02em;
    }
    .stats-bar-actions {
      display: flex; align-items: center;
      padding: 20px 24px;
    }

    /* ── PRODUCTS TABLE ───────────────────────────────────────── */
    .products-table {
      width: 100%; border-collapse: collapse;
    }
    .products-table th {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--text-muted);
      padding: 0 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .products-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--text);
      vertical-align: middle;
    }
    .products-table tr:hover td { background: var(--surface2); }
    .products-table tr:last-child td { border-bottom: none; }

    .product-link {
      color: var(--purple); text-decoration: none;
      font-weight: 500; font-size: 13px;
      transition: opacity 0.15s;
    }
    .product-link:hover { opacity: 0.7; text-decoration: underline; }

    input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--purple); cursor: pointer;
    }

    input[type="text"] {
      width: 100%; padding: 8px 12px;
      border: 1px solid var(--border-strong);
      border-radius: 7px; font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface); color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus {
      outline: none; border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-mid);
    }
    input[type="text"]:disabled {
      background: var(--surface2);
      color: var(--text-faint); cursor: not-allowed;
    }
    input[type="text"]::placeholder { color: var(--text-faint); }

    .sales-count {
      font-family: 'DM Mono', monospace;
      font-size: 12px; font-weight: 500;
      color: var(--purple);
      background: var(--purple-light);
      padding: 3px 10px; border-radius: 6px;
    }

    /* ── LOADING ─────────────────────────────────────────────── */
    .loading {
      position: fixed; inset: 0;
      background: rgba(245,244,240,0.85);
      backdrop-filter: blur(4px);
      display: none; align-items: center;
      justify-content: center; z-index: 9999;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border-strong);
      border-top-color: var(--purple);
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SAVE TOAST ─────────────────────────────────────────── */
    .save-status {
      display: none; position: fixed;
      bottom: 28px; right: 28px;
      background: var(--green); color: white;
      padding: 12px 22px; border-radius: 10px;
      font-weight: 600; font-size: 13px;
      animation: slideUp 0.25s ease-out; z-index: 9998;
    }
    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ── CLOSE BTN ──────────────────────────────────────────── */
    .close-btn {
      padding: 8px 18px;
      background: var(--surface2);
      border: 1px solid var(--border-strong);
      color: var(--text); border-radius: 9px;
      cursor: pointer; font-weight: 500; font-size: 13px;
      font-family: 'DM Sans', sans-serif; transition: background 0.15s;
    }
    .close-btn:hover { background: var(--border-strong); }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { padding: 20px 16px; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .search-input { width: 100%; }
      .stats-bar { flex-direction: column; }
      .stat { border-right: none; border-bottom: 1px solid var(--border); }
      .overview-table td, .overview-table th { padding: 8px; font-size: 11px; }
      .products-table td, .products-table th { padding: 8px; font-size: 11px; }
    }
  </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="save-status" id="saveStatus">✓ Saved</div>

<div class="container">

  <!-- Page Header -->
  <div class="page-header">
    <div class="header-left">
      <div class="header-logo">
        <img src="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw" alt="Kapruka">
      </div>
      <div>
        <h1>Hot Products</h1>
        <div class="subtitle">Product Suggestions Dashboard</div>
      </div>
    </div>
    <a href="index.html" class="back-btn">← Back</a>
  </div>

  <!-- Overview Table Card -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
      <h2 style="margin-bottom:0;">🔥 All Categories Overview</h2>
      <input class="search-input" type="text" id="tableSearch"
             placeholder="Search category..."
             oninput="filterTable(this.value)">
    </div>

    <div style="overflow-x:auto;">
      <table class="overview-table" id="overviewTable">
        <thead>
          <tr>
            <th style="width:4%;">#</th>
            <th style="width:30%;">Category</th>
            <th class="center" style="width:14%;">Suggested</th>
            <th class="center" style="width:14%;">Fulfilled</th>
            <th class="center" style="width:14%;">Pending</th>
            <th style="width:18%;">Progress</th>
            <th class="center" style="width:6%;">View</th>
          </tr>
        </thead>
        <tbody id="overviewBody">
        </tbody>
        <tfoot>
          <tr>
            <td colspan="2">TOTAL</td>
            <td class="center" id="footTotal"><span class="shimmer"></span></td>
            <td class="center" id="footFulfilled"><span class="shimmer"></span></td>
            <td class="center" id="footPending"><span class="shimmer"></span></td>
            <td colspan="2"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <!-- Detail Panel -->
  <div id="detailPanel" style="display:none;">
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-label">Total Products</div>
        <div class="stat-value" id="totalProducts">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Fulfilled</div>
        <div class="stat-value" id="listedProducts">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Category</div>
        <div class="stat-value" id="currentCategory" style="font-size:16px;font-family:'DM Sans',sans-serif;font-weight:600;">—</div>
      </div>
      <div class="stats-bar-actions" style="margin-left:auto;">
        <button class="close-btn" onclick="closeDetail()">✕ Close</button>
      </div>
    </div>

    <div class="card">
      <h2 id="detailTitle">📦 Products</h2>
      <div style="overflow-x:auto;">
        <table class="products-table">
          <thead>
            <tr>
              <th style="width:30%;">Product Name</th>
              <th style="width:12%;">Link</th>
              <th style="width:10%;">Sales</th>
              <th style="width:8%;text-align:center;">Listed</th>
              <th style="width:40%;">Kapruka Link</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted);">Select a category</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script src="js/supabase-api.js"></script>
<script>
  const PRODUCT_CATEGORIES = Array.isArray(CATEGORIES) ? [...new Set(CATEGORIES)] : [];

  let selectedCategory = null;
  let currentProducts  = [];
  let categoryCountMap = {};
  let allRowsData      = [];

  const showLoading = () => document.getElementById('loading').style.display = 'flex';
  const hideLoading = () => document.getElementById('loading').style.display = 'none';

  function showSaveStatus() {
    const el = document.getElementById('saveStatus');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2000);
  }

  function extractProductName(url) {
    try {
      const parts = new URL(url).pathname.split('/').filter(Boolean);
      return parts[parts.length - 1]
        .replace(/-/g, ' ')
        .replace(/\.html?$/i, '')
        .substring(0, 55);
    } catch { return 'Product Link'; }
  }

  function buildSkeletonRows() {
    const tbody = document.getElementById('overviewBody');
    tbody.innerHTML = PRODUCT_CATEGORIES.map((cat, i) => `
      <tr id="row-${i}">
        <td style="color:var(--text-faint);font-size:12px;">${i + 1}</td>
        <td style="font-weight:500;">${cat}</td>
        <td class="center"><span class="shimmer"></span></td>
        <td class="center"><span class="shimmer"></span></td>
        <td class="center"><span class="shimmer"></span></td>
        <td><div class="progress-wrap"><div class="progress-bar" style="width:0%"></div></div></td>
        <td class="center">
          <button class="view-btn" id="viewbtn-${i}" onclick="selectCategory('${cat.replace(/'/g,"\\'")}', ${i})" disabled>
            View
          </button>
        </td>
      </tr>
    `).join('');
    allRowsData = PRODUCT_CATEGORIES.map((cat, i) => ({ cat, i }));
  }

  async function loadAllCategoryCounts() {
    const results = await Promise.all(
      PRODUCT_CATEGORIES.map((cat, i) =>
        getHotProductsByCategory(cat)
          .then(products => ({
            i, cat,
            total:  products.length,
            listed: products.filter(p => p.listed).length
          }))
          .catch(() => ({ i, cat, total: 0, listed: 0 }))
      )
    );

    let grandTotal = 0, grandListed = 0;

    results.forEach(({ i, cat, total, listed }) => {
      categoryCountMap[cat] = { total, listed };
      const pending = total - listed;
      const pct     = total > 0 ? Math.round((listed / total) * 100) : 0;

      grandTotal  += total;
      grandListed += listed;

      const row = document.getElementById(`row-${i}`);
      if (!row) return;

      row.cells[2].innerHTML = total > 0
        ? `<span class="badge badge-suggested">📦 ${total}</span>`
        : `<span class="badge badge-zero">📦 0</span>`;

      row.cells[3].innerHTML = listed > 0
        ? `<span class="badge badge-fulfilled">✅ ${listed}</span>`
        : `<span class="badge badge-zero">✅ 0</span>`;

      row.cells[4].innerHTML = pending > 0
        ? `<span class="badge badge-pending">⏳ ${pending}</span>`
        : `<span class="badge badge-zero">⏳ 0</span>`;

      row.cells[5].innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="progress-wrap" style="flex:1;">
            <div class="progress-bar" style="width:${pct}%"></div>
          </div>
          <span style="font-size:11px;color:var(--text-muted);min-width:30px;font-family:'DM Mono',monospace;">${pct}%</span>
        </div>`;

      const btn = document.getElementById(`viewbtn-${i}`);
      if (btn) btn.disabled = false;
    });

    const grandPending = grandTotal - grandListed;
    document.getElementById('footTotal').innerHTML =
      `<span class="badge badge-suggested">📦 ${grandTotal}</span>`;
    document.getElementById('footFulfilled').innerHTML =
      `<span class="badge badge-fulfilled">✅ ${grandListed}</span>`;
    document.getElementById('footPending').innerHTML =
      grandPending > 0
        ? `<span class="badge badge-pending">⏳ ${grandPending}</span>`
        : `<span class="badge badge-zero">⏳ 0</span>`;
  }

  function filterTable(query) {
    const q = query.toLowerCase().trim();
    document.querySelectorAll('#overviewBody tr').forEach(row => {
      const catName = row.cells[1]?.textContent.toLowerCase() || '';
      row.style.display = catName.includes(q) ? '' : 'none';
    });
  }

  async function selectCategory(category, rowIndex) {
    selectedCategory = category;

    document.querySelectorAll('#overviewBody tr').forEach(r => r.classList.remove('active-row'));
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    const activeRow = document.getElementById(`row-${rowIndex}`);
    if (activeRow) activeRow.classList.add('active-row');
    const activeBtn = document.getElementById(`viewbtn-${rowIndex}`);
    if (activeBtn) activeBtn.classList.add('active');

    showLoading();
    try {
      const products = await getHotProductsByCategory(category);
      displayProducts(products, category);
      document.getElementById('detailPanel').style.display = 'block';
      document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (err) {
      alert('Error loading products: ' + err.message);
    }
    hideLoading();
  }

  function closeDetail() {
    document.getElementById('detailPanel').style.display = 'none';
    document.querySelectorAll('#overviewBody tr').forEach(r => r.classList.remove('active-row'));
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    selectedCategory = null;
  }

  function displayProducts(products, category) {
    currentProducts = products;
    document.getElementById('currentCategory').textContent = category;
    document.getElementById('detailTitle').textContent     = `📦 Products — ${category}`;

    const total  = products.length;
    const listed = products.filter(p => p.listed).length;
    document.getElementById('totalProducts').textContent = total;
    document.getElementById('listedProducts').textContent = listed;

    const tbody = document.getElementById('productsTableBody');

    if (total === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" style="text-align:center;padding:60px;color:var(--text-faint);">
            <div style="font-size:40px;margin-bottom:12px;">📭</div>
            No products added to this category yet
          </td>
        </tr>`;
      return;
    }

    tbody.innerHTML = products.map(p => `
      <tr data-id="${p.id}">
        <td style="font-weight:500;">${extractProductName(p.product_link)}</td>
        <td><a href="${p.product_link}" target="_blank" class="product-link">View →</a></td>
        <td><span class="sales-count">${p.sales_count || 0}</span></td>
        <td style="text-align:center;">
          <input type="checkbox"
                 ${p.listed ? 'checked' : ''}
                 onchange="updateListed(${p.id}, this.checked)"
                 id="listed-${p.id}">
        </td>
        <td>
          <input type="text"
                 value="${p.kapruka_link || ''}"
                 placeholder="Enter Kapruka link..."
                 onblur="updateKaprukaLink(${p.id}, this.value)"
                 ${!p.listed ? 'disabled' : ''}
                 id="link-${p.id}">
        </td>
      </tr>
    `).join('');
  }

  async function updateListed(productId, isListed) {
    try {
      await updateHotProduct(productId, { listed: isListed });

      const linkInput = document.getElementById(`link-${productId}`);
      linkInput.disabled = !isListed;
      if (!isListed) {
        linkInput.value = '';
        await updateHotProduct(productId, { kapruka_link: '' });
      }

      const product = currentProducts.find(p => p.id === productId);
      if (product) product.listed = isListed;

      const newListed = currentProducts.filter(p => p.listed).length;
      document.getElementById('listedProducts').textContent = newListed;

      if (selectedCategory) {
        categoryCountMap[selectedCategory] = { total: currentProducts.length, listed: newListed };
        const rowIndex = PRODUCT_CATEGORIES.indexOf(selectedCategory);
        if (rowIndex !== -1) {
          const pending = currentProducts.length - newListed;
          const pct     = currentProducts.length > 0 ? Math.round((newListed / currentProducts.length) * 100) : 0;
          const row     = document.getElementById(`row-${rowIndex}`);
          if (row) {
            row.cells[3].innerHTML = newListed > 0
              ? `<span class="badge badge-fulfilled">✅ ${newListed}</span>`
              : `<span class="badge badge-zero">✅ 0</span>`;
            row.cells[4].innerHTML = pending > 0
              ? `<span class="badge badge-pending">⏳ ${pending}</span>`
              : `<span class="badge badge-zero">⏳ 0</span>`;
            row.cells[5].innerHTML = `
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="progress-wrap" style="flex:1;">
                  <div class="progress-bar" style="width:${pct}%"></div>
                </div>
                <span style="font-size:11px;color:var(--text-muted);min-width:30px;font-family:'DM Mono',monospace;">${pct}%</span>
              </div>`;
          }
        }
      }

      showSaveStatus();
    } catch (err) {
      console.error(err);
      alert('Error saving: ' + err.message);
      document.getElementById(`listed-${productId}`).checked = !isListed;
    }
  }

  async function updateKaprukaLink(productId, link) {
    try {
      await updateHotProduct(productId, { kapruka_link: link });
      showSaveStatus();
    } catch (err) {
      console.error(err);
      alert('Error saving link: ' + err.message);
    }
  }

  window.onload = () => {
    buildSkeletonRows();
    loadAllCategoryCounts();
  };
</script>
</body>
</html>
