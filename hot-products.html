<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Products - Kapruka</title>
  <link rel="icon" type="image/png" href="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1a0b2e 0%, #3d2461 50%, #5e3a8e 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 40px; }
    .kapruka-logo {
      width: 100px; height: 100px;
      margin: 0 auto 20px;
      border-radius: 50%; overflow: hidden;
      box-shadow: 0 15px 50px rgba(0,0,0,0.5);
    }
    .kapruka-logo img { width: 100%; height: 100%; object-fit: cover; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      background: linear-gradient(135deg, #FFD700, #FFF, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .subtitle {
      color: rgba(255,255,255,0.8);
      font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1); color: white;
      padding: 12px 24px; border-radius: 12px;
      text-decoration: none; font-weight: 600; transition: all 0.3s;
      margin-bottom: 30px; border: 2px solid rgba(255,255,255,0.2);
    }
    .back-btn:hover {
      background: rgba(255,215,0,0.2); border-color: #FFD700;
      transform: translateX(-5px);
    }
    .card {
      background: rgba(255,255,255,0.98);
      padding: 35px; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); margin-bottom: 30px;
    }
    .card h2 {
      font-family: 'Playfair Display', serif;
      color: #5e3a8e; font-size: 28px; margin-bottom: 20px;
    }

    /* ── Overview Table ── */
    .overview-table {
      width: 100%; border-collapse: collapse;
      border-radius: 12px; overflow: hidden;
    }
    .overview-table th {
      background: linear-gradient(135deg, #5e3a8e, #3d2461);
      color: white; padding: 14px 16px; text-align: left;
      font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .overview-table th.center { text-align: center; }
    .overview-table td {
      padding: 13px 16px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px; color: #333;
      vertical-align: middle;
    }
    .overview-table td.center { text-align: center; }
    .overview-table tbody tr { transition: background 0.2s; cursor: pointer; }
    .overview-table tbody tr:hover { background: #f5f0ff; }
    .overview-table tbody tr.active-row { background: #ede4ff; }
    .overview-table tbody tr:last-child td { border-bottom: none; }
    .overview-table tfoot td {
      padding: 13px 16px; font-weight: 700;
      background: #f9f4ff; color: #5e3a8e;
      font-size: 14px; border-top: 2px solid #e0d0ff;
    }
    .overview-table tfoot td.center { text-align: center; }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      font-weight: 700; font-size: 13px;
    }
    .badge-suggested { background: #f0e6ff; color: #5e3a8e; border: 1px solid #c9a9f5; }
    .badge-fulfilled  { background: #e6f9ed; color: #2e7d4f; border: 1px solid #a0dbb8; }
    .badge-pending    { background: #fff4e0; color: #a05c00; border: 1px solid #f5c97a; }
    .badge-zero       { background: #f5f5f5; color: #aaa;    border: 1px solid #ddd; }

    /* Progress bar */
    .progress-wrap {
      width: 100%; background: #eee;
      border-radius: 10px; height: 8px; overflow: hidden;
    }
    .progress-bar {
      height: 8px; border-radius: 10px;
      background: linear-gradient(90deg, #5e3a8e, #a07fd4);
      transition: width 0.5s ease;
    }

    /* View button */
    .view-btn {
      padding: 7px 16px; border-radius: 8px;
      border: 2px solid #5e3a8e; background: white;
      color: #5e3a8e; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .view-btn:hover, .view-btn.active {
      background: #5e3a8e; color: white;
    }

    /* Shimmer skeleton */
    .shimmer {
      display: inline-block; width: 36px; height: 14px;
      background: linear-gradient(90deg, #e0e0e0 25%, #f5f5f5 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px; vertical-align: middle;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Search */
    .search-input {
      padding: 10px 16px; border: 2px solid #e0e0e0;
      border-radius: 10px; font-size: 14px;
      font-family: 'Inter', sans-serif; width: 240px;
      transition: border-color 0.2s;
    }
    .search-input:focus { outline: none; border-color: #a07fd4; }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 20px; padding: 22px;
      background: linear-gradient(135deg, #5e3a8e, #3d2461);
      border-radius: 14px; margin-bottom: 25px; color: white; flex-wrap: wrap;
      align-items: center;
    }
    .stat { flex: 1; min-width: 140px; }
    .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-bottom: 5px; }
    .stat-value { font-size: 28px; font-weight: 700; font-family: 'Playfair Display', serif; }

    /* Products table */
    .products-table {
      width: 100%; border-collapse: collapse;
      background: white; border-radius: 12px;
      overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    .products-table th {
      background: linear-gradient(135deg, #5e3a8e, #3d2461);
      color: white; padding: 14px 12px; text-align: left;
      font-weight: 700; font-size: 13px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .products-table td {
      padding: 14px 12px; border-bottom: 1px solid #f0f0f0;
      font-size: 14px; color: #333;
    }
    .products-table tr:hover { background: #fafafa; }
    .products-table tr:last-child td { border-bottom: none; }
    .product-link {
      color: #5e3a8e; text-decoration: none;
      font-weight: 600; transition: color 0.2s;
    }
    .product-link:hover { color: #a07fd4; text-decoration: underline; }
    input[type="checkbox"] { width: 18px; height: 18px; accent-color: #5e3a8e; cursor: pointer; }
    input[type="text"] {
      width: 100%; padding: 8px 12px;
      border: 2px solid #e8e8e8; border-radius: 8px;
      font-size: 13px; font-family: 'Inter', sans-serif; transition: border-color 0.2s;
    }
    input[type="text"]:focus { outline: none; border-color: #FFD700; }
    input[type="text"]:disabled { background: #f5f5f5; cursor: not-allowed; }
    .sales-count {
      color: #FFD700; background: #5e3a8e;
      padding: 4px 10px; border-radius: 8px;
      font-weight: 700; font-size: 12px;
    }

    /* Loading overlay */
    .loading {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      display: none; align-items: center;
      justify-content: center; z-index: 9999;
    }
    .spinner {
      width: 60px; height: 60px;
      border: 5px solid rgba(255,215,0,0.3);
      border-top-color: #FFD700;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Save toast */
    .save-status {
      display: none; position: fixed;
      bottom: 30px; right: 30px;
      background: #4CAF50; color: white;
      padding: 15px 25px; border-radius: 12px; font-weight: 600;
      box-shadow: 0 8px 25px rgba(76,175,80,0.4);
      animation: slideUp 0.3s ease-out; z-index: 9998;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Close btn */
    .close-btn {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      color: white; padding: 10px 20px;
      border-radius: 10px; cursor: pointer;
      font-weight: 600; font-size: 14px;
      font-family: 'Inter', sans-serif; transition: all 0.2s;
    }
    .close-btn:hover { background: rgba(255,255,255,0.25); }

    @media (max-width: 768px) {
      h1 { font-size: 28px; }
      .search-input { width: 100%; }
      .stats-bar { flex-direction: column; }
      .overview-table td, .overview-table th { padding: 10px 10px; font-size: 12px; }
      .products-table td, .products-table th { padding: 10px 8px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="save-status" id="saveStatus">✓ Saved Successfully!</div>

<div class="container">
  <a href="index.html" class="back-btn">← Back to Home</a>

  <div class="header">
    <div class="kapruka-logo">
      <img src="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw" alt="Kapruka">
    </div>
    <h1>Hot Products</h1>
    <p class="subtitle">Product Suggestions Dashboard</p>
  </div>

  <!-- ── Overview Table Card ── -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <h2 style="margin-bottom:0;">🔥 All Categories Overview</h2>
      <input class="search-input" type="text" id="tableSearch"
             placeholder="🔍 Search category..."
             oninput="filterTable(this.value)">
    </div>

    <div style="overflow-x:auto;">
      <table class="overview-table" id="overviewTable">
        <thead>
          <tr>
            <th style="width:4%;">#</th>
            <th style="width:30%;">Category</th>
            <th class="center" style="width:14%;">📦 Suggested</th>
            <th class="center" style="width:14%;">✅ Fulfilled</th>
            <th class="center" style="width:14%;">⏳ Pending</th>
            <th style="width:18%;">Progress</th>
            <th class="center" style="width:6%;">View</th>
          </tr>
        </thead>
        <tbody id="overviewBody">
          <!-- JS renders rows -->
        </tbody>
        <tfoot>
          <tr>
            <td colspan="2">TOTAL</td>
            <td class="center" id="footTotal"><span class="shimmer"></span></td>
            <td class="center" id="footFulfilled"><span class="shimmer"></span></td>
            <td class="center" id="footPending"><span class="shimmer"></span></td>
            <td colspan="2"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <!-- ── Detail Panel ── -->
  <div id="detailPanel" style="display:none;">
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-label">Total Products</div>
        <div class="stat-value" id="totalProducts">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Fulfilled</div>
        <div class="stat-value" id="listedProducts">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Category</div>
        <div class="stat-value" id="currentCategory" style="font-size:20px;">—</div>
      </div>
      <div style="display:flex;align-items:center;margin-left:auto;">
        <button class="close-btn" onclick="closeDetail()">✕ Close</button>
      </div>
    </div>

    <div class="card">
      <h2 id="detailTitle">📦 Products</h2>
      <div style="overflow-x:auto;">
        <table class="products-table">
          <thead>
            <tr>
              <th style="width:30%;">Product Name</th>
              <th style="width:12%;">Link</th>
              <th style="width:10%;">Sales</th>
              <th style="width:8%;text-align:center;">Listed</th>
              <th style="width:40%;">Kapruka Link</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr><td colspan="5" style="text-align:center;padding:40px;">Select a category</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script src="js/supabase-api.js"></script>
<script>
  const PRODUCT_CATEGORIES = Array.isArray(CATEGORIES) ? [...new Set(CATEGORIES)] : [];

  let selectedCategory = null;
  let currentProducts  = [];
  let categoryCountMap = {}; // { cat: { total, listed } }
  let allRowsData      = []; // for search filtering

  /* ── Utilities ── */
  const showLoading = () => document.getElementById('loading').style.display = 'flex';
  const hideLoading = () => document.getElementById('loading').style.display = 'none';

  function showSaveStatus() {
    const el = document.getElementById('saveStatus');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2000);
  }

  function extractProductName(url) {
    try {
      const parts = new URL(url).pathname.split('/').filter(Boolean);
      return parts[parts.length - 1]
        .replace(/-/g, ' ')
        .replace(/\.html?$/i, '')
        .substring(0, 55);
    } catch { return 'Product Link'; }
  }

  /* ── Build skeleton rows immediately ── */
  function buildSkeletonRows() {
    const tbody = document.getElementById('overviewBody');
    tbody.innerHTML = PRODUCT_CATEGORIES.map((cat, i) => `
      <tr id="row-${i}">
        <td style="color:#aaa;font-size:13px;">${i + 1}</td>
        <td style="font-weight:600;">${cat}</td>
        <td class="center"><span class="shimmer"></span></td>
        <td class="center"><span class="shimmer"></span></td>
        <td class="center"><span class="shimmer"></span></td>
        <td><div class="progress-wrap"><div class="progress-bar" style="width:0%"></div></div></td>
        <td class="center">
          <button class="view-btn" id="viewbtn-${i}" onclick="selectCategory('${cat.replace(/'/g,"\\'")}', ${i})" disabled>
            View
          </button>
        </td>
      </tr>
    `).join('');
    allRowsData = PRODUCT_CATEGORIES.map((cat, i) => ({ cat, i }));
  }

  /* ── Load all category counts in parallel ── */
  async function loadAllCategoryCounts() {
    const results = await Promise.all(
      PRODUCT_CATEGORIES.map((cat, i) =>
        getHotProductsByCategory(cat)
          .then(products => ({
            i, cat,
            total:  products.length,
            listed: products.filter(p => p.listed).length
          }))
          .catch(() => ({ i, cat, total: 0, listed: 0 }))
      )
    );

    let grandTotal = 0, grandListed = 0;

    results.forEach(({ i, cat, total, listed }) => {
      categoryCountMap[cat] = { total, listed };
      const pending = total - listed;
      const pct     = total > 0 ? Math.round((listed / total) * 100) : 0;

      grandTotal  += total;
      grandListed += listed;

      const row = document.getElementById(`row-${i}`);
      if (!row) return;

      row.cells[2].innerHTML = total > 0
        ? `<span class="badge badge-suggested">📦 ${total}</span>`
        : `<span class="badge badge-zero">📦 0</span>`;

      row.cells[3].innerHTML = listed > 0
        ? `<span class="badge badge-fulfilled">✅ ${listed}</span>`
        : `<span class="badge badge-zero">✅ 0</span>`;

      row.cells[4].innerHTML = pending > 0
        ? `<span class="badge badge-pending">⏳ ${pending}</span>`
        : `<span class="badge badge-zero">⏳ 0</span>`;

      row.cells[5].innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="progress-wrap" style="flex:1;">
            <div class="progress-bar" style="width:${pct}%"></div>
          </div>
          <span style="font-size:12px;color:#888;min-width:32px;">${pct}%</span>
        </div>`;

      const btn = document.getElementById(`viewbtn-${i}`);
      if (btn) btn.disabled = false;
    });

    const grandPending = grandTotal - grandListed;
    document.getElementById('footTotal').innerHTML =
      `<span class="badge badge-suggested">📦 ${grandTotal}</span>`;
    document.getElementById('footFulfilled').innerHTML =
      `<span class="badge badge-fulfilled">✅ ${grandListed}</span>`;
    document.getElementById('footPending').innerHTML =
      grandPending > 0
        ? `<span class="badge badge-pending">⏳ ${grandPending}</span>`
        : `<span class="badge badge-zero">⏳ 0</span>`;
  }

  /* ── Filter table by search ── */
  function filterTable(query) {
    const q = query.toLowerCase().trim();
    document.querySelectorAll('#overviewBody tr').forEach(row => {
      const catName = row.cells[1]?.textContent.toLowerCase() || '';
      row.style.display = catName.includes(q) ? '' : 'none';
    });
  }

  /* ── Select category → show detail ── */
  async function selectCategory(category, rowIndex) {
    selectedCategory = category;

    // Highlight active row
    document.querySelectorAll('#overviewBody tr').forEach(r => r.classList.remove('active-row'));
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    const activeRow = document.getElementById(`row-${rowIndex}`);
    if (activeRow) activeRow.classList.add('active-row');
    const activeBtn = document.getElementById(`viewbtn-${rowIndex}`);
    if (activeBtn) activeBtn.classList.add('active');

    showLoading();
    try {
      const products = await getHotProductsByCategory(category);
      displayProducts(products, category);
      document.getElementById('detailPanel').style.display = 'block';
      document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (err) {
      alert('Error loading products: ' + err.message);
    }
    hideLoading();
  }

  /* ── Close detail panel ── */
  function closeDetail() {
    document.getElementById('detailPanel').style.display = 'none';
    document.querySelectorAll('#overviewBody tr').forEach(r => r.classList.remove('active-row'));
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    selectedCategory = null;
  }

  /* ── Render products in detail table ── */
  function displayProducts(products, category) {
    currentProducts = products;
    document.getElementById('currentCategory').textContent = category;
    document.getElementById('detailTitle').textContent     = `📦 Products — ${category}`;

    const total  = products.length;
    const listed = products.filter(p => p.listed).length;
    document.getElementById('totalProducts').textContent = total;
    document.getElementById('listedProducts').textContent = listed;

    const tbody = document.getElementById('productsTableBody');

    if (total === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" style="text-align:center;padding:60px;color:#bbb;">
            <div style="font-size:48px;margin-bottom:12px;">📭</div>
            No products added to this category yet
          </td>
        </tr>`;
      return;
    }

    tbody.innerHTML = products.map(p => `
      <tr data-id="${p.id}">
        <td style="font-weight:600;color:#333;">${extractProductName(p.product_link)}</td>
        <td><a href="${p.product_link}" target="_blank" class="product-link">View →</a></td>
        <td><span class="sales-count">${p.sales_count || 0}</span></td>
        <td style="text-align:center;">
          <input type="checkbox"
                 ${p.listed ? 'checked' : ''}
                 onchange="updateListed(${p.id}, this.checked)"
                 id="listed-${p.id}">
        </td>
        <td>
          <input type="text"
                 value="${p.kapruka_link || ''}"
                 placeholder="Enter Kapruka link..."
                 onblur="updateKaprukaLink(${p.id}, this.value)"
                 ${!p.listed ? 'disabled' : ''}
                 id="link-${p.id}">
        </td>
      </tr>
    `).join('');
  }

  /* ── Update listed status ── */
  async function updateListed(productId, isListed) {
    try {
      await updateHotProduct(productId, { listed: isListed });

      const linkInput = document.getElementById(`link-${productId}`);
      linkInput.disabled = !isListed;
      if (!isListed) {
        linkInput.value = '';
        await updateHotProduct(productId, { kapruka_link: '' });
      }

      const product = currentProducts.find(p => p.id === productId);
      if (product) product.listed = isListed;

      const newListed = currentProducts.filter(p => p.listed).length;
      document.getElementById('listedProducts').textContent = newListed;

      // Refresh overview row badge
      if (selectedCategory) {
        categoryCountMap[selectedCategory] = { total: currentProducts.length, listed: newListed };
        const rowIndex = PRODUCT_CATEGORIES.indexOf(selectedCategory);
        if (rowIndex !== -1) {
          const pending = currentProducts.length - newListed;
          const pct     = currentProducts.length > 0 ? Math.round((newListed / currentProducts.length) * 100) : 0;
          const row     = document.getElementById(`row-${rowIndex}`);
          if (row) {
            row.cells[3].innerHTML = newListed > 0
              ? `<span class="badge badge-fulfilled">✅ ${newListed}</span>`
              : `<span class="badge badge-zero">✅ 0</span>`;
            row.cells[4].innerHTML = pending > 0
              ? `<span class="badge badge-pending">⏳ ${pending}</span>`
              : `<span class="badge badge-zero">⏳ 0</span>`;
            row.cells[5].innerHTML = `
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="progress-wrap" style="flex:1;">
                  <div class="progress-bar" style="width:${pct}%"></div>
                </div>
                <span style="font-size:12px;color:#888;min-width:32px;">${pct}%</span>
              </div>`;
          }
        }
      }

      showSaveStatus();
    } catch (err) {
      console.error(err);
      alert('Error saving: ' + err.message);
      document.getElementById(`listed-${productId}`).checked = !isListed;
    }
  }

  /* ── Update Kapruka link ── */
  async function updateKaprukaLink(productId, link) {
    try {
      await updateHotProduct(productId, { kapruka_link: link });
      showSaveStatus();
    } catch (err) {
      console.error(err);
      alert('Error saving link: ' + err.message);
    }
  }

  /* ── Init ── */
  window.onload = () => {
    buildSkeletonRows();
    loadAllCategoryCounts();
  };
</script>
</body>
</html>
