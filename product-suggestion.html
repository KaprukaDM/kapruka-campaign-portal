<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Suggestion — Kapruka</title>
  <link rel="icon" type="image/png" href="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --bg:            #f5f4f0;
      --surface:       #fffffe;
      --surface2:      #f0ede8;
      --border:        rgba(0,0,0,0.07);
      --border-strong: rgba(0,0,0,0.16);
      --text:          #111;
      --text-muted:    #888;
      --text-faint:    #bbb;
      --purple:        #5e3a8e;
      --purple-dark:   #4a2d70;
      --purple-light:  #f3eeff;
      --purple-mid:    rgba(94,58,142,0.08);
      --gold:          #c9a227;
      --gold-bg:       #fef9ec;
      --gold-border:   rgba(201,162,39,0.35);
      --green:         #16a34a;
      --green-bg:      #dcfce7;
      --amber:         #b45309;
      --amber-bg:      #fef3c7;
      --red:           #dc2626;
      --red-bg:        #fee2e2;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    /* ── PAGE HEADER ─────────────────────────────────────────── */
    .header {
      background: var(--surface);
      padding: 20px 28px;
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .kapruka-logo {
      width: 40px; height: 40px;
      border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .kapruka-logo img { width: 100%; height: 100%; object-fit: cover; }
    .header h1 {
      font-size: 20px; font-weight: 600;
      color: var(--text); letter-spacing: -0.02em;
    }
    .header .subtitle {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--text-muted); margin-top: 3px;
    }
    .back-btn {
      padding: 8px 20px;
      background: var(--purple); color: white;
      border: none; border-radius: 10px; cursor: pointer;
      font-weight: 500; font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none; display: inline-block;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .back-btn:hover { opacity: 0.85; }

    /* ── WINDOW INFO BANNER ────────────────────────────────────── */
    .window-info {
      background: var(--green-bg);
      border: 1px solid rgba(22,163,74,0.2);
      color: var(--green);
      padding: 16px 22px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }
    .window-info strong {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em;
      display: block; margin-bottom: 4px;
      color: var(--green);
    }
    .window-info span {
      font-size: 14px; font-weight: 500;
      font-family: 'DM Mono', monospace;
      color: var(--text);
    }

    /* ── DASHBOARD STAT CARDS ───────────────────────────────────── */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      text-align: center;
    }
    .stat-icon { font-size: 28px; margin-bottom: 10px; }
    .stat-number {
      font-size: 40px; font-weight: 300;
      font-family: 'DM Mono', monospace;
      color: var(--purple);
      letter-spacing: -0.03em;
      margin: 6px 0;
    }
    .stat-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--text-muted);
    }
    .progress-container {
      background: var(--surface2);
      height: 6px; border-radius: 999px;
      overflow: hidden; margin-top: 14px;
    }
    .progress-bar {
      background: var(--purple);
      height: 100%;
      transition: width 0.8s ease;
      border-radius: 999px;
    }

    /* ── CHART ───────────────────────────────────────────────── */
    .chart-container {
      background: var(--surface);
      padding: 28px; border-radius: 20px;
      border: 1px solid var(--border); margin-bottom: 20px;
    }
    .chart-title {
      font-size: 14px; font-weight: 600;
      color: var(--text); letter-spacing: -0.01em;
      margin-bottom: 20px;
    }
    .bar-chart { display: flex; flex-direction: column; gap: 12px; }
    .bar-item { display: flex; align-items: center; gap: 12px; }
    .bar-label {
      min-width: 140px; font-weight: 500;
      color: var(--text-muted); font-size: 12px;
    }
    .bar-container {
      flex: 1; background: var(--surface2);
      height: 24px; border-radius: 6px;
      overflow: hidden; position: relative;
    }
    .bar-fill {
      height: 100%;
      background: var(--purple);
      border-radius: 6px;
      transition: width 0.8s ease;
      display: flex; align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      color: white; font-weight: 600;
      font-size: 11px; font-family: 'DM Mono', monospace;
    }

    /* ── SEARCH BOX ───────────────────────────────────────────── */
    .search-box {
      background: var(--surface);
      padding: 24px; border-radius: 20px;
      border: 1px solid var(--border); margin-bottom: 20px;
    }
    .search-box h3 {
      font-size: 14px; font-weight: 600;
      color: var(--text); margin-bottom: 12px;
    }
    .search-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 9px; font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface); color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input:focus {
      outline: none; border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-mid);
    }
    .search-input::placeholder { color: var(--text-faint); }
    .search-results {
      margin-top: 14px;
      max-height: 280px; overflow-y: auto;
    }
    .result-item {
      padding: 12px 14px;
      background: var(--surface2);
      border-radius: 10px;
      margin-bottom: 8px;
      border-left: 3px solid var(--purple);
    }
    .result-item strong {
      color: var(--text); font-size: 13px;
      display: block; margin-bottom: 3px;
    }
    .result-item div { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .result-item a {
      color: var(--purple); text-decoration: none;
      font-size: 12px; font-weight: 500;
    }
    .result-item a:hover { text-decoration: underline; }

    /* ── CARD & FORM ───────────────────────────────────────────── */
    .card {
      background: var(--surface);
      padding: 28px; border-radius: 20px;
      border: 1px solid var(--border); margin-bottom: 20px;
    }
    .card h2 {
      font-size: 16px; font-weight: 600;
      color: var(--text); letter-spacing: -0.02em; margin-bottom: 22px;
    }

    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--text-muted); margin-bottom: 7px;
    }
    input[type="url"],
    input[type="number"],
    textarea,
    select {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 9px; font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface); color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="url"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    select:focus {
      outline: none; border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-mid);
    }
    input::placeholder, textarea::placeholder { color: var(--text-faint); }
    textarea { min-height: 90px; resize: vertical; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Radio group */
    .radio-group { display: flex; gap: 12px; margin-top: 6px; }
    .radio-option {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border: 1px solid var(--border-strong);
      border-radius: 9px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 13px;
    }
    .radio-option:hover {
      border-color: var(--purple);
      background: var(--purple-light);
    }
    .radio-option input[type="radio"] {
      width: 16px; height: 16px;
      cursor: pointer; padding: 0;
      accent-color: var(--purple);
    }
    .radio-option label { margin: 0; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text); text-transform: none; letter-spacing: 0; }

    /* Submit button */
    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--purple); color: white;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; letter-spacing: 0.02em;
      margin-top: 18px;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── LOADING ─────────────────────────────────────────────── */
    .loading {
      position: fixed; inset: 0;
      background: rgba(245,244,240,0.85);
      backdrop-filter: blur(4px);
      display: none; align-items: center;
      justify-content: center; z-index: 9999;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border-strong);
      border-top-color: var(--purple);
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL ───────────────────────────────────────────────── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: none; align-items: center;
      justify-content: center; z-index: 10000;
    }
    .modal-content {
      background: var(--surface);
      padding: 40px; border-radius: 20px;
      max-width: 480px; width: 90%;
      text-align: center;
      border: 1px solid var(--border);
    }
    .modal-icon {
      width: 64px; height: 64px;
      background: var(--green-bg);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px; color: var(--green);
    }
    .modal h2 {
      font-size: 20px; font-weight: 600;
      color: var(--text); letter-spacing: -0.02em; margin-bottom: 10px;
    }
    .modal p { font-size: 14px; color: var(--text-muted); }
    .modal-btn {
      padding: 11px 32px;
      background: var(--purple); color: white;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; margin-top: 20px;
      transition: opacity 0.15s;
    }
    .modal-btn:hover { opacity: 0.85; }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { padding: 20px 16px; }
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .form-row { grid-template-columns: 1fr; }
      .dashboard { grid-template-columns: 1fr; }
      .radio-group { flex-direction: column; }
      .bar-label { min-width: 90px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading"><div class="spinner"></div></div>
  <div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

  <div class="container">

    <!-- Page Header -->
    <div class="header">
      <div class="header-left">
        <div class="kapruka-logo">
          <img src="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw" alt="Kapruka">
        </div>
        <div>
          <h1>Product Suggestion</h1>
          <div class="subtitle">Winning Product Ideas</div>
        </div>
      </div>
      <a href="index.html" class="back-btn">← Back</a>
    </div>

    <!-- Window Banner -->
    <div class="window-info">
      <strong>🟢 Current Ongoing Window</strong>
      <span id="windowDates">Loading...</span>
    </div>

    <!-- Stats -->
    <div class="dashboard">
      <div class="stat-card">
        <div class="stat-icon">🎯</div>
        <div class="stat-number" id="targetCount">30</div>
        <div class="stat-label">Target Products</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-number" id="actualCount">0</div>
        <div class="stat-label">Submitted This Week</div>
        <div class="progress-container">
          <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-number" id="pickedCount">0</div>
        <div class="stat-label">Selected Products</div>
      </div>
    </div>

    <!-- Bar Chart -->
    <div class="chart-container">
      <div class="chart-title">📊 Product Suggestions by Category</div>
      <div class="bar-chart" id="barChart">
        <p style="text-align:center;color:var(--text-faint);font-size:13px;">Loading chart...</p>
      </div>
    </div>

    <!-- Search -->
    <div class="search-box">
      <h3>🔍 Search Product Suggestions</h3>
      <input type="text" id="searchInput" class="search-input" placeholder="Search by product link, category, or ID...">
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Submit Form -->
    <div class="card">
      <h2>💡 Submit Product Suggestion</h2>

      <form id="productForm">
        <div class="form-group">
          <label>🔗 Product Link *</label>
          <input type="url" id="productLink" required placeholder="https://www.kapruka.com/products/...">
        </div>

        <div class="form-group">
          <label>🏪 Kapruka or Partner Central? *</label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" id="kapruka" name="productType" value="Kapruka" checked>
              <label for="kapruka">Kapruka</label>
            </div>
            <div class="radio-option">
              <input type="radio" id="fc" name="productType" value="FC">
              <label for="fc">Partner Central</label>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>📂 Product Category *</label>
            <select id="category" required>
              <option value="">Select Category</option>
              <option value="Electronics">Electronics</option>
              <option value="Fashion">Fashion</option>
              <option value="Home &amp; Living">Home &amp; Living</option>
              <option value="Beauty &amp; Health">Beauty &amp; Health</option>
              <option value="Sports &amp; Outdoors">Sports &amp; Outdoors</option>
              <option value="Toys &amp; Kids">Toys &amp; Kids</option>
              <option value="Books &amp; Media">Books &amp; Media</option>
              <option value="Food &amp; Beverages">Food &amp; Beverages</option>
              <option value="Automotive">Automotive</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>💰 Margin % *</label>
            <input type="number" id="margin" required placeholder="e.g., 25" step="0.01" min="0" max="100">
          </div>
        </div>

        <div class="form-group">
          <label>📦 Available Quantity *</label>
          <input type="number" id="availableQty" required placeholder="e.g., 100" min="1">
        </div>

        <div class="form-group">
          <label>🎨 Promotion Idea (Optional)</label>
          <textarea id="promotionIdea" placeholder="Describe your promotion strategy (e.g., Flash Sale, Bundle Deal, Limited Time Offer)"></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">🚀 Submit Product</button>
      </form>
    </div>

  </div>

  <script src="js/supabase-api.js"></script>
  <script>
    function showLoading() {
      document.getElementById('loading').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }

    async function loadDashboard() {
      try {
        showLoading();
        const data = await getProductDashboard();

        if (!data.window) {
          document.getElementById('windowDates').textContent = 'No active window';
          hideLoading();
          return;
        }

        document.getElementById('targetCount').textContent = data.target;
        document.getElementById('actualCount').textContent = data.actual;
        document.getElementById('pickedCount').textContent = data.picked;

        const progressPercent = Math.min((data.actual / data.target) * 100, 100);
        document.getElementById('progressBar').style.width = progressPercent + '%';

        const startDate = new Date(data.window.start_date).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
        const endDate = new Date(data.window.end_date).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
        document.getElementById('windowDates').textContent = `${startDate} - ${endDate}`;

        renderBarChart(data.categories);
        hideLoading();
      } catch (error) {
        hideLoading();
        console.error('Dashboard error:', error);
        document.getElementById('windowDates').textContent = 'Error loading';
      }
    }

    function renderBarChart(categories) {
      const container = document.getElementById('barChart');

      if (!categories || categories.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-faint);font-size:13px;">No data yet</p>';
        return;
      }

      const maxCount = Math.max(...categories.map(c => c.count));

      container.innerHTML = categories.map(cat => {
        const percentage = (cat.count / maxCount) * 100;
        return `
          <div class="bar-item">
            <div class="bar-label">${cat.category}</div>
            <div class="bar-container">
              <div class="bar-fill" style="width:${percentage}%">${cat.count}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const query = e.target.value.trim();

      if (query.length < 3) {
        document.getElementById('searchResults').innerHTML = '';
        return;
      }

      searchTimeout = setTimeout(async () => {
        try {
          const results = await searchProductSuggestions(query);
          const container = document.getElementById('searchResults');

          if (results.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:var(--text-faint);padding:20px;font-size:13px;">No products found</p>';
            return;
          }

          container.innerHTML = results.map(r => `
            <div class="result-item">
              <strong>${r.submission_id} \u2014 ${r.category}</strong>
              <div>${new Date(r.timestamp).toLocaleDateString()}</div>
              <a href="${r.product_link}" target="_blank">View Product \u2192</a>
              <div style="margin-top:5px;">
                <span style="background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;">${r.status}</span>
              </div>
            </div>
          `).join('');
        } catch (error) {
          console.error('Search error:', error);
        }
      }, 500);
    });

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Submitting...';
      showLoading();

      try {
        const formData = {
          productLink: document.getElementById('productLink').value,
          productType: document.querySelector('input[name="productType"]:checked').value,
          category: document.getElementById('category').value,
          margin: document.getElementById('margin').value,
          availableQty: document.getElementById('availableQty').value,
          promotionIdea: document.getElementById('promotionIdea').value
        };

        const result = await submitProductSuggestion(formData);

        btn.disabled = false;
        btn.textContent = '\ud83d\ude80 Submit Product';
        hideLoading();

        document.getElementById('modalContent').innerHTML = `
          <div class="modal-icon">\u2713</div>
          <h2>Success!</h2>
          <p>Product suggestion submitted successfully!</p>
          <div style="background:var(--surface2);padding:10px 14px;border-radius:8px;margin:16px 0;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;">${result.submissionId}</div>
          <button class="modal-btn" onclick="closeModal()">Close</button>
        `;
        document.getElementById('modal').style.display = 'flex';

        document.getElementById('productForm').reset();
        loadDashboard();

      } catch (error) {
        btn.disabled = false;
        btn.textContent = '\ud83d\ude80 Submit Product';
        hideLoading();
        alert('Error: ' + error.message);
      }
    });

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    window.onload = loadDashboard;
  </script>
</body>
</html>
