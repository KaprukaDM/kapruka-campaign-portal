<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Calendar — Kapruka</title>
  <link rel="icon" type="image/png" href="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --bg:            #f5f4f0;
      --surface:       #fffffe;
      --surface2:      #f0ede8;
      --border:        rgba(0,0,0,0.07);
      --border-strong: rgba(0,0,0,0.16);
      --text:          #111;
      --text-muted:    #888;
      --text-faint:    #bbb;
      --purple:        #5e3a8e;
      --purple-dark:   #4a2d70;
      --purple-light:  #f3eeff;
      --purple-mid:    rgba(94,58,142,0.08);
      --gold:          #c9a227;
      --gold-bg:       #fef9ec;
      --gold-border:   rgba(201,162,39,0.35);
      --green:         #16a34a;
      --green-bg:      #dcfce7;
      --amber:         #b45309;
      --amber-bg:      #fef3c7;
      --red:           #dc2626;
      --red-bg:        #fee2e2;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    /* ── PAGE HEADER ─────────────────────────────────────────── */
    .header {
      background: var(--surface);
      padding: 20px 28px;
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .kapruka-logo {
      width: 40px; height: 40px;
      border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .kapruka-logo img { width: 100%; height: 100%; object-fit: cover; }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .back-btn {
      padding: 8px 20px;
      background: var(--purple);
      color: white; border: none;
      border-radius: 10px; cursor: pointer;
      font-weight: 500; font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none; display: inline-block;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .back-btn:hover { opacity: 0.85; }

    /* ── CONTROLS ───────────────────────────────────────────── */
    .controls {
      display: flex; justify-content: center;
      gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }

    .month-selector {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      padding: 12px 20px; border-radius: 14px;
      border: 1px solid var(--border);
    }

    .month-selector button {
      background: var(--purple);
      color: white; border: none;
      width: 34px; height: 34px;
      border-radius: 8px; font-size: 16px;
      cursor: pointer; transition: opacity 0.15s;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }
    .month-selector button:hover { opacity: 0.85; }

    .month-display {
      font-size: 16px; font-weight: 600;
      color: var(--text); min-width: 180px;
      text-align: center; letter-spacing: -0.01em;
    }

    /* ── CALENDAR CARD ───────────────────────────────────────── */
    .calendar-card {
      background: var(--surface);
      padding: 24px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-header {
      text-align: center;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--text-muted); padding: 8px 4px;
    }

    .day-cell {
      background: var(--surface2);
      border-radius: 12px;
      min-height: 110px; padding: 8px;
      border: 1px solid var(--border);
      transition: border-color 0.15s;
      position: relative; display: flex;
      flex-direction: column; overflow: hidden;
      cursor: default;
    }
    .day-cell:hover {
      border-color: var(--gold-border);
    }
    .day-cell.other-month { opacity: 0.25; }
    .day-cell.other-month:hover { border-color: var(--border); }

    .day-cell.seasonal {
      background: #fff5f8;
      border-color: rgba(236,72,153,0.25);
    }
    .day-cell.fully-booked {
      background: var(--green-bg);
      border-color: rgba(22,163,74,0.3);
      border-width: 2px;
    }

    .fully-booked-badge {
      position: absolute; top: 5px; right: 5px;
      background: var(--green); color: white;
      font-size: 7px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 4px;
    }

    .day-number {
      font-size: 14px; font-weight: 600;
      color: var(--text); margin-bottom: 5px; flex-shrink: 0;
    }

    .day-theme {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted); margin-bottom: 4px;
      flex-shrink: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .slot-preview {
      font-size: 9px;
      background: var(--purple-light);
      color: var(--purple);
      padding: 3px 5px; border-radius: 4px;
      margin: 2px 0; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
      overflow: hidden; word-wrap: break-word; min-height: 18px;
    }
    .slot-preview:hover { background: rgba(94,58,142,0.15); }
    .slot-preview.booked  { background: var(--green-bg);  color: var(--green);  border-left: 2px solid var(--green); }
    .slot-preview.pending { background: var(--amber-bg);  color: var(--amber);  border-left: 2px solid var(--amber); }
    .slot-preview.rejected{ background: var(--red-bg);    color: var(--red);    border-left: 2px solid var(--red); text-decoration: line-through; opacity: 0.6; }

    .slot-code {
      font-family: 'DM Mono', monospace;
      font-size: 8px; font-weight: 500;
      margin-top: 2px; display: block;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
    }

    /* ── LOADING ─────────────────────────────────────────────── */
    .loading {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(245,244,240,0.85);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 9999;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border-strong);
      border-top-color: var(--purple);
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL ───────────────────────────────────────────────── */
    .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 10000;
    }
    .modal-content {
      background: var(--surface);
      padding: 32px; border-radius: 20px;
      max-width: 560px; max-height: 90vh; overflow-y: auto; width: 90%;
      border: 1px solid var(--border);
    }
    .modal-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px;
    }
    .modal h2 {
      font-size: 18px; font-weight: 600;
      color: var(--text); letter-spacing: -0.02em;
    }
    .close-btn {
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--text-muted);
      transition: color 0.15s; line-height: 1;
    }
    .close-btn:hover { color: var(--text); }

    .date-info {
      background: var(--purple-light);
      border: 1px solid rgba(94,58,142,0.15);
      color: var(--purple);
      padding: 14px 18px; border-radius: 10px;
      margin-bottom: 18px; text-align: center;
      font-weight: 600; font-size: 14px;
    }
    .date-info div { font-weight: 400; font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    /* ── FULLY BOOKED MESSAGE ─────────────────────────────────── */
    .fully-booked-message {
      background: var(--green-bg);
      border: 1px solid rgba(22,163,74,0.2);
      color: var(--green);
      padding: 20px; border-radius: 12px;
      text-align: center; margin: 16px 0;
      font-weight: 600;
    }
    .fully-booked-message .icon { font-size: 32px; margin-bottom: 8px; }

    /* ── SLOT CARDS (modal) ──────────────────────────────────── */
    .slots-container { display: grid; gap: 12px; margin-bottom: 16px; }

    .slot-card {
      border: 1px solid var(--border-strong);
      border-radius: 12px; padding: 14px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .slot-card:hover { border-color: var(--gold-border); background: var(--gold-bg); }
    .slot-card.selected { border-color: var(--purple); background: var(--purple-light); }
    .slot-card.booked { background: var(--surface2); cursor: not-allowed; opacity: 0.55; }
    .slot-card.booked:hover { border-color: var(--border-strong); background: var(--surface2); }
    .slot-card.booked.clickable { cursor: pointer; opacity: 1; background: var(--green-bg); border-color: rgba(22,163,74,0.3); }
    .slot-card.booked.clickable:hover { border-color: var(--green); }
    .slot-card.rejected { background: var(--red-bg); border-color: rgba(220,38,38,0.2); opacity: 0.8; }
    .slot-card.rejected .slot-title { text-decoration: line-through; color: var(--text-muted); }

    .rejection-badge {
      background: var(--red); color: white;
      padding: 2px 8px; border-radius: 6px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
    }

    .slot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .slot-title { font-weight: 600; color: var(--text); font-size: 14px; }
    .slot-category {
      background: var(--gold-bg); color: var(--gold);
      border: 1px solid var(--gold-border);
      padding: 3px 10px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
    }

    .booking-details {
      margin-top: 8px; padding: 10px 12px;
      background: var(--surface2); border-radius: 8px;
      font-size: 12px; color: var(--text-muted);
    }
    .booking-details strong { display: block; color: var(--text); margin-bottom: 4px; font-size: 12px; }
    .booking-details .product-code {
      font-family: 'DM Mono', monospace;
      font-size: 13px; font-weight: 500;
      color: var(--green); background: var(--green-bg);
      padding: 4px 10px; border-radius: 6px;
      display: inline-block; margin-top: 4px;
      word-wrap: break-word; max-width: 100%;
    }

    /* ── FORM ───────────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--text-muted); margin-bottom: 6px;
    }

    input, textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 8px; font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface); color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, textarea:focus {
      outline: none; border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-mid);
    }
    input::placeholder, textarea::placeholder { color: var(--text-faint); }

    .btn-submit {
      width: 100%; padding: 12px;
      background: var(--purple); color: white;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: opacity 0.15s, transform 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── LEGEND ───────────────────────────────────────────────── */
    .legend {
      display: flex; gap: 16px;
      justify-content: center;
      margin-top: 20px; flex-wrap: wrap;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-dot.available { background: var(--surface2); border: 1.5px solid var(--border-strong); }
    .legend-dot.booked    { background: var(--green); }
    .legend-dot.pending   { background: var(--amber); }
    .legend-dot.seasonal  { background: #ec4899; }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { padding: 20px 16px; }
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .calendar-grid { gap: 4px; }
      .day-cell { min-height: 75px; padding: 5px; }
      .day-number { font-size: 12px; }
      .slot-preview { font-size: 8px; }
      .slot-code { font-size: 7px; }
      .modal-content { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading"><div class="spinner"></div></div>
  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <div class="container">

    <!-- Page Header -->
    <div class="header">
      <div class="header-left">
        <div class="kapruka-logo">
          <img src="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw" alt="Kapruka">
        </div>
        <div>
          <h1>Content Calendar</h1>
          <div class="subtitle">Daily Content Booking System</div>
        </div>
      </div>
      <a href="index.html" class="back-btn">← Back</a>
    </div>

    <div class="controls">
      <div class="month-selector">
        <button onclick="changeMonth(-1)">←</button>
        <div class="month-display" id="monthDisplay">Loading...</div>
        <button onclick="changeMonth(1)">→</button>
      </div>
    </div>

    <div class="calendar-card">
      <div class="calendar-grid" id="calendarGrid">
        <div style="text-align:center;padding:40px;grid-column:1/-1;color:var(--text-muted);">Loading calendar...</div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot available"></div> Available</div>
        <div class="legend-item"><div class="legend-dot booked"></div> Booked</div>
        <div class="legend-item"><div class="legend-dot pending"></div> Pending</div>
        <div class="legend-item"><div class="legend-dot seasonal"></div> Seasonal</div>
      </div>
    </div>
  </div>

  <script src="js/supabase-api.js"></script>
  <script>
    let currentMonth = new Date().getMonth() + 1;
    let currentYear = new Date().getFullYear();
    let calendarData = null;
    let selectedDate = null;
    let selectedSlot = null;

    function showLoading() {
      document.getElementById('loading').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 12) {
        currentMonth = 1;
        currentYear++;
      } else if (currentMonth < 1) {
        currentMonth = 12;
        currentYear--;
      }
      loadCalendar();
    }

    async function loadCalendar() {
      try {
        showLoading();

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                           'July', 'August', 'September', 'October', 'November', 'December'];
        document.getElementById('monthDisplay').textContent = `${monthNames[currentMonth - 1]} ${currentYear}`;

        calendarData = await getCalendarData(currentMonth, currentYear);
        console.log('Calendar Data:', calendarData);
        renderCalendar();

        hideLoading();
      } catch (error) {
        hideLoading();
        console.error('Calendar load error:', error);
        alert('Error loading calendar: ' + error.message);
      }
    }

    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      days.forEach(day => {
        const header = document.createElement('div');
        header.className = 'day-header';
        header.textContent = day;
        grid.appendChild(header);
      });

      const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
      const totalDays = new Date(currentYear, currentMonth, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        grid.appendChild(cell);
      }

      const bookingsByDate = {};
      if (calendarData.bookings && calendarData.bookings.length > 0) {
        calendarData.bookings.forEach(booking => {
          const dateKey = booking.date;
          if (!bookingsByDate[dateKey]) {
            bookingsByDate[dateKey] = [];
          }
          bookingsByDate[dateKey].push(booking);
        });
      }

      for (let day = 1; day <= totalDays; day++) {
        const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayBookings = bookingsByDate[dateStr] || [];
        const cell = createDayCell(day, dateStr, dayBookings);
        grid.appendChild(cell);
      }
    }

    function truncateCode(code, maxLength = 12) {
      if (!code) return '';
      if (code.length <= maxLength) return code;
      return code.substring(0, maxLength) + '...';
    }

    function createDayCell(day, dateStr, dayBookings) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      const themes = calendarData.themes.filter(t => dateStr >= t.start_date && dateStr <= t.end_date);

      const hasSeasonal = themes.some(t => t.is_seasonal);
      if (hasSeasonal) {
        cell.classList.add('seasonal');
        const seasonalTheme = themes.find(t => t.is_seasonal);
        if (seasonalTheme && seasonalTheme.theme_color) {
          cell.style.borderColor = seasonalTheme.theme_color;
          cell.style.background = `linear-gradient(135deg, ${seasonalTheme.theme_color}22, ${seasonalTheme.theme_color}11)`;
        }
      }

      const themeNames = themes.map(t => t.theme_name).join(' + ');

      cell.innerHTML = `
        <div class="day-number">${day}</div>
        ${themes.length > 0 ? `<div class="day-theme" title="${themeNames}">${themeNames}</div>` : ''}
      `;

      const availableSlots = calendarData.categorySlots.filter(s => s.date === dateStr);
      const activeBookings = dayBookings.filter(b => b.status === 'Approved' || b.status === 'Pending');

      const allSlotsFilled = availableSlots.length > 0 && 
        availableSlots.every(slot => 
          activeBookings.some(b => b.slot_number === slot.slot_number)
        );

      if (allSlotsFilled) {
        cell.classList.add('fully-booked');
        const badge = document.createElement('div');
        badge.className = 'fully-booked-badge';
        badge.textContent = 'FULL';
        cell.appendChild(badge);
      }

      if (dayBookings.length > 0) {
        dayBookings.forEach(booking => {
          const slotDiv = document.createElement('div');
          slotDiv.className = 'slot-preview';

          if (booking.status === 'Approved') {
            slotDiv.classList.add('booked');
          } else if (booking.status === 'Pending') {
            slotDiv.classList.add('pending');
          } else if (booking.status === 'Rejected') {
            slotDiv.classList.add('rejected');
          }

          const statusIcon = booking.status === 'Approved' ? '\u2713' : 
                            booking.status === 'Pending' ? '\u23f3' : '\u2717';

          const categoryShort = booking.category.length > 15 ? booking.category.substring(0, 15) + '...' : booking.category;
          const productCodeShort = truncateCode(booking.product_code, 10);

          slotDiv.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">
              <span title="${booking.category}">${categoryShort}</span>
              <span>${statusIcon}</span>
            </div>
            ${booking.product_code ? `<span class="slot-code" title="${booking.product_code}">📦 ${productCodeShort}</span>` : ''}
          `;

          slotDiv.style.cursor = 'pointer';
          slotDiv.onclick = (e) => {
            e.stopPropagation();
            showBookingDetails(booking, dateStr, themes);
          };

          cell.appendChild(slotDiv);
        });
      }

      if (availableSlots.length > 0) {
        availableSlots.forEach(slot => {
          const isSlotBooked = activeBookings.some(b => b.slot_number === slot.slot_number);

          if (!isSlotBooked) {
            const slotDiv = document.createElement('div');
            slotDiv.className = 'slot-preview';
            const categoryShort = slot.category.length > 15 ? slot.category.substring(0, 15) + '...' : slot.category;
            slotDiv.innerHTML = `<span title="${slot.category}">${categoryShort}</span><span>\u25cb</span>`;
            cell.appendChild(slotDiv);
          }
        });
      }

      const hasAvailableSlots = availableSlots.some(slot => 
        !activeBookings.some(b => b.slot_number === slot.slot_number)
      );

      if (themes.length > 0 && hasAvailableSlots) {
        cell.style.cursor = 'pointer';
        cell.onclick = () => openBookingModal(dateStr, themes, availableSlots, dayBookings);
      } else if (themes.length === 0 || availableSlots.length === 0 || allSlotsFilled) {
        cell.style.cursor = 'default';
        if (!allSlotsFilled) {
          cell.style.opacity = '0.7';
        }
      }

      return cell;
    }

    function showBookingDetails(booking, date, themes) {
      const modal = document.getElementById('modal');
      const content = document.getElementById('modalContent');

      const dateObj = new Date(date + 'T00:00:00');
      const formattedDate = dateObj.toLocaleDateString('en-US', {
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric'
      });

      const themeNames = Array.isArray(themes) 
        ? themes.map(t => t.theme_name).join(' + ') 
        : themes.theme_name || 'No Theme';

      let statusBadge;
      if (booking.status === 'Approved') {
        statusBadge = '<span style="background:var(--green-bg);color:var(--green);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;">✓ Approved</span>';
      } else if (booking.status === 'Pending') {
        statusBadge = '<span style="background:var(--amber-bg);color:var(--amber);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;">⏳ Pending</span>';
      } else if (booking.status === 'Rejected') {
        statusBadge = '<span style="background:var(--red-bg);color:var(--red);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;">✗ Rejected</span>';
      }

      content.innerHTML = `
        <div class="modal-header">
          <h2>Booking Details</h2>
          <button class="close-btn" onclick="closeModal()">×</button>
        </div>

        <div class="date-info">
          <strong>${formattedDate}</strong>
          <div>${themeNames}</div>
        </div>

        <div style="background:var(--surface2);padding:18px;border-radius:12px;border:1px solid var(--border);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <h3 style="color:var(--text);font-size:14px;font-weight:600;">Slot ${booking.slot_number}</h3>
            ${statusBadge}
          </div>

          <div style="margin-bottom:12px;">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-muted);margin-bottom:5px;">Category</div>
            <div style="background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border);padding:6px 12px;border-radius:6px;display:inline-block;font-size:13px;font-weight:600;">
              ${booking.category}
            </div>
          </div>

          <div style="margin-bottom:12px;">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-muted);margin-bottom:5px;">Product Code</div>
            <div style="background:var(--green-bg);color:var(--green);padding:8px 12px;border-radius:6px;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;word-wrap:break-word;">
              📦 ${booking.product_code || 'N/A'}
            </div>
          </div>

          ${booking.product_link ? `
          <div style="margin-bottom:12px;">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-muted);margin-bottom:5px;">Product Link</div>
            <div style="margin-top:3px;">
              <a href="${booking.product_link}" target="_blank" style="color:var(--purple);font-size:13px;word-break:break-all;">
                🔗 ${booking.product_link}
              </a>
            </div>
          </div>
          ` : ''}

          ${booking.rejection_reason ? `
          <div style="margin-bottom:12px;">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--red);margin-bottom:5px;">❌ Rejection Reason</div>
            <div style="background:var(--red-bg);color:var(--red);padding:10px 12px;border-radius:6px;font-size:13px;">
              ${booking.rejection_reason}
            </div>
          </div>
          ` : ''}

          <div style="margin-bottom:12px;">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-muted);margin-bottom:5px;">Submitted By</div>
            <div style="color:var(--text);font-size:13px;">👤 ${booking.submitted_by || 'Unknown'}</div>
          </div>

          <div>
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-muted);margin-bottom:5px;">Submitted On</div>
            <div style="color:var(--text);font-size:13px;font-family:'DM Mono',monospace;">📅 ${booking.created_at ? new Date(booking.created_at).toLocaleString() : 'N/A'}</div>
          </div>
        </div>

        <button class="btn-submit" onclick="closeModal()" style="margin-top:16px;background:var(--surface2);color:var(--text);border:1px solid var(--border-strong);">
          Close
        </button>
      `;

      modal.style.display = 'flex';
    }

    function openBookingModal(date, themes, slots, bookings) {
      selectedDate = date;
      const modal = document.getElementById('modal');
      const content = document.getElementById('modalContent');

      const dateObj = new Date(date + 'T00:00:00');
      const formattedDate = dateObj.toLocaleDateString('en-US', {
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric'
      });

      const themeNames = Array.isArray(themes) 
        ? themes.map(t => t.theme_name).join(' + ') 
        : themes.theme_name;

      content.innerHTML = `
        <div class="modal-header">
          <h2>Book Content Slot</h2>
          <button class="close-btn" onclick="closeModal()">×</button>
        </div>

        <div class="date-info">
          <strong>${formattedDate}</strong>
          <div>${themeNames}</div>
        </div>

        <div class="slots-container" id="slotsContainer"></div>

        <div id="bookingForm" style="display:none;">
          <hr style="margin:16px 0;border:none;border-top:1px solid var(--border);">
          <div class="form-group">
            <label>📦 Product Code *</label>
            <input type="text" id="productCode" required placeholder="Enter product code">
          </div>
          <div class="form-group">
            <label>🔗 Product Link (Optional)</label>
            <input type="url" id="productLink" placeholder="https://www.kapruka.com/...">
          </div>
          <button class="btn-submit" onclick="submitBooking()">🚀 Submit Booking</button>
        </div>
      `;

      const slotsContainer = document.getElementById('slotsContainer');
      let hasAvailableSlots = false;

      slots.forEach(slot => {
        const existingBooking = bookings.find(b => b.slot_number === slot.slot_number);
        const isBooked = existingBooking && (existingBooking.status === 'Approved' || existingBooking.status === 'Pending');

        if (!isBooked) hasAvailableSlots = true;

        const slotCard = document.createElement('div');

        if (isBooked) {
          slotCard.className = 'slot-card booked clickable';
          slotCard.innerHTML = `
            <div class="slot-header">
              <div class="slot-title">Slot ${slot.slot_number}</div>
              <div class="slot-category">${slot.category}</div>
            </div>
            <div class="booking-details">
              <strong>Booked by: ${existingBooking.submitted_by || 'someone'}</strong>
              <div class="product-code">${existingBooking.product_code || 'No code'}</div>
            </div>
          `;
          slotCard.onclick = () => showBookingDetails(existingBooking, date, themes);
        } else if (existingBooking && existingBooking.status === 'Rejected') {
          slotCard.className = 'slot-card rejected';
          slotCard.innerHTML = `
            <div class="slot-header">
              <div class="slot-title">Slot ${slot.slot_number}</div>
              <div class="slot-category">${slot.category}</div>
            </div>
            <div style="margin-top:8px;padding:8px 10px;background:var(--red-bg);border-radius:6px;font-size:12px;color:var(--red);">
              <span class="rejection-badge">REJECTED</span>
              <div style="margin-top:4px;font-style:italic;opacity:0.8;">${existingBooking.rejection_reason || 'Previously rejected'}</div>
              <div style="margin-top:6px;font-weight:600;color:var(--purple);">\u2728 Available for new booking</div>
            </div>
          `;
          slotCard.onclick = () => selectSlot(slot, slotCard);
        } else {
          slotCard.className = 'slot-card';
          slotCard.innerHTML = `
            <div class="slot-header">
              <div class="slot-title">Slot ${slot.slot_number}</div>
              <div class="slot-category">${slot.category}</div>
            </div>
          `;
          slotCard.onclick = () => selectSlot(slot, slotCard);
        }

        slotsContainer.appendChild(slotCard);
      });

      if (!hasAvailableSlots) {
        slotsContainer.innerHTML = `
          <div class="fully-booked-message">
            <div class="icon">🎉</div>
            <div style="font-size:16px;margin-bottom:6px;font-weight:600;">All Slots Booked!</div>
            <div style="font-size:13px;opacity:0.85;">This day is fully booked. Check back later or contact admin.</div>
          </div>
        ` + slotsContainer.innerHTML;
      }

      modal.style.display = 'flex';
    }

    function selectSlot(slot, element) {
      document.querySelectorAll('.slot-card').forEach(c => c.classList.remove('selected'));
      element.classList.add('selected');
      selectedSlot = slot;
      document.getElementById('bookingForm').style.display = 'block';
    }

    async function submitBooking() {
      if (!selectedSlot) {
        alert('Please select a slot');
        return;
      }

      const productCode = document.getElementById('productCode').value.trim();
      if (!productCode) {
        alert('Please enter product code');
        return;
      }

      try {
        showLoading();

        const bookingData = {
          date: selectedDate,
          slotNumber: selectedSlot.slot_number,
          category: selectedSlot.category,
          productCode: productCode,
          productLink: document.getElementById('productLink').value.trim(),
          submittedBy: 'User'
        };

        await submitContentBooking(bookingData);

        hideLoading();
        closeModal();
        alert('\u2705 Booking submitted successfully!\n\nYour booking is pending admin approval.');
        loadCalendar();

      } catch (error) {
        hideLoading();
        console.error('Submit error:', error);
        alert('Error: ' + error.message);
      }
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      selectedSlot = null;
    }

    window.onclick = function(event) {
      const modal = document.getElementById('modal');
      if (event.target === modal) {
        closeModal();
      }
    }

    window.onload = loadCalendar;
  </script>
</body>
</html>
