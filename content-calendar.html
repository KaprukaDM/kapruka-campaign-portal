<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Calendar - Kapruka</title>
  <link rel="icon" type="image/png" href="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Page-specific styles only ── */
    .controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .month-selector {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255,255,255,0.95);
      padding: 15px 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .month-selector button {
      background: linear-gradient(135deg, #5e3a8e, #3d2461);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .month-selector button:hover {
      transform: scale(1.1);
      box-shadow: 0 5px 15px rgba(94,58,142,0.4);
    }
    .month-display {
      font-size: 20px;
      font-weight: 700;
      color: #5e3a8e;
      min-width: 180px;
      text-align: center;
    }
    .calendar-card {
      background: rgba(255,255,255,0.98);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    .day-header {
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      color: #5e3a8e;
      padding: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .day-cell {
      background: #f9f9f9;
      border-radius: 12px;
      min-height: 120px;
      padding: 10px;
      transition: all 0.3s;
      border: 2px solid transparent;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .day-cell:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      border-color: #FFD700;
    }
    .day-cell.other-month { opacity: 0.3; cursor: default; }
    .day-cell.other-month:hover { transform: none; box-shadow: none; border-color: transparent; }
    .day-cell.seasonal { background: linear-gradient(135deg, #FFE5E5, #FFF0F0); border-color: #FF69B4; }
    .day-cell.fully-booked { background: linear-gradient(135deg, #C8E6C9, #A5D6A7); border-color: #4CAF50; border-width: 3px; }
    .fully-booked-badge {
      position: absolute; top: 5px; right: 5px;
      background: #4CAF50; color: white;
      font-size: 8px; padding: 2px 6px; border-radius: 10px; font-weight: 700; text-transform: uppercase;
    }
    .day-number { font-weight: 700; font-size: 16px; color: #5e3a8e; margin-bottom: 8px; flex-shrink: 0; }
    .day-theme {
      font-size: 10px; color: #666; margin-bottom: 5px; font-weight: 600; text-transform: uppercase;
      flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .slot-preview {
      font-size: 9px; background: rgba(94,58,142,0.1); padding: 4px 6px; border-radius: 4px;
      margin: 2px 0; color: #5e3a8e; font-weight: 500; cursor: pointer; transition: all 0.2s;
      overflow: hidden; word-wrap: break-word; min-height: 20px;
    }
    .slot-preview:hover { background: rgba(94,58,142,0.2); transform: scale(1.02); }
    .slot-preview.booked  { background: #d4edda; color: #155724; border-left: 3px solid #28a745; }
    .slot-preview.pending { background: #fff3cd; color: #856404; border-left: 3px solid #ffc107; }
    .slot-preview.rejected { background: #f8d7da; color: #721c24; border-left: 3px solid #dc3545; text-decoration: line-through; opacity: 0.6; }
    .slot-code {
      font-weight: 700; font-size: 9px; margin-top: 2px; display: block;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
    }
    .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); display: none;
      align-items: center; justify-content: center; z-index: 10000;
    }
    .modal-content {
      background: white; padding: 40px; border-radius: 24px;
      max-width: 600px; max-height: 90vh; overflow-y: auto; width: 90%;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .modal h2 { font-family: 'Playfair Display', serif; color: #5e3a8e; font-size: 28px; }
    .close-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: #999; transition: color 0.3s; }
    .close-btn:hover { color: #5e3a8e; }
    .date-info {
      background: linear-gradient(135deg, #5e3a8e, #3d2461);
      color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 25px;
    }
    .date-info h3 { font-size: 18px; margin-bottom: 5px; }
    .date-info p  { font-size: 13px; opacity: 0.8; }
    .slots-list { margin-bottom: 25px; }
    .slot-item {
      display: flex; align-items: center; gap: 15px;
      padding: 15px; background: #f9f9f9; border-radius: 12px; margin-bottom: 10px;
      border: 2px solid transparent; transition: all 0.3s; cursor: pointer;
    }
    .slot-item:hover { border-color: #5e3a8e; background: #f0ebff; }
    .slot-item.booked  { background: #e8f5e9; border-color: #4CAF50; }
    .slot-item.pending { background: #fff8e1; border-color: #FFC107; }
    .slot-item.rejected { background: #ffeef0; border-color: #dc3545; opacity: 0.7; }
    .slot-number {
      width: 35px; height: 35px; background: linear-gradient(135deg, #5e3a8e, #3d2461);
      color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .slot-info { flex: 1; }
    .slot-platform { font-weight: 700; font-size: 14px; color: #333; }
    .slot-time     { font-size: 12px; color: #666; margin-top: 2px; }
    .slot-status   { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .slot-status.available { background: #e3f2fd; color: #1976D2; }
    .slot-status.booked    { background: #e8f5e9; color: #2E7D32; }
    .slot-status.pending   { background: #fff8e1; color: #F57F17; }
    .slot-status.rejected  { background: #ffeef0; color: #c62828; }
    .booking-form label { display: block; font-weight: 600; color: #333; margin-bottom: 8px; font-size: 14px; }
    .booking-form input,
    .booking-form select,
    .booking-form textarea {
      width: 100%; padding: 12px 16px; border: 2px solid #e8e8e8; border-radius: 10px;
      font-size: 14px; font-family: 'Inter', sans-serif; margin-bottom: 20px;
      transition: all 0.3s;
    }
    .booking-form input:focus,
    .booking-form select:focus,
    .booking-form textarea:focus { outline: none; border-color: #FFD700; box-shadow: 0 0 0 3px rgba(255,215,0,0.1); }
    .booking-form textarea { height: 100px; resize: vertical; }
    .submit-btn {
      width: 100%; padding: 16px; background: linear-gradient(135deg, #5e3a8e, #3d2461);
      color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(94,58,142,0.4); }
    .booked-detail { padding: 15px; background: #e8f5e9; border-radius: 12px; margin-bottom: 15px; }
    .booked-detail .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
    .booked-detail .detail-label { color: #666; }
    .booked-detail .detail-value { font-weight: 700; color: #333; }
    .legend { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }
    .legend-dot   { width: 12px; height: 12px; border-radius: 50%; }
    .legend-dot.available { background: #f9f9f9; border: 2px solid #ddd; }
    .legend-dot.booked    { background: #4CAF50; }
    .legend-dot.pending   { background: #FFC107; }
    .legend-dot.seasonal  { background: #FF69B4; }
    @media (max-width: 768px) {
      h1 { font-size: 28px; }
      .calendar-grid { gap: 5px; }
      .day-cell { min-height: 80px; padding: 6px; }
      .day-number { font-size: 13px; }
      .modal-content { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading"><div class="spinner"></div></div>

  <div class="container">
    <div class="header">
      <div class="kapruka-logo">
        <img src="https://play-lh.googleusercontent.com/XPaIW4RsTkd8au1rBlcwAtdyynz9pZyPVn3QPK4gXbboroWxFI3hpVhn18IrIBrUtztj=w240-h480-rw" alt="Kapruka">
      </div>
      <h1>Content Calendar</h1>
      <p class="subtitle">Kapruka Official Page</p>
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>

    <div class="controls">
      <div class="month-selector">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-display" id="monthDisplay">Loading...</div>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="calendar-card">
      <div class="calendar-grid" id="calendarGrid">
        <!-- Day headers -->
        <div class="day-header">Sun</div>
        <div class="day-header">Mon</div>
        <div class="day-header">Tue</div>
        <div class="day-header">Wed</div>
        <div class="day-header">Thu</div>
        <div class="day-header">Fri</div>
        <div class="day-header">Sat</div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot available"></div> Available</div>
        <div class="legend-item"><div class="legend-dot booked"></div> Booked</div>
        <div class="legend-item"><div class="legend-dot pending"></div> Pending</div>
        <div class="legend-item"><div class="legend-dot seasonal"></div> Seasonal</div>
      </div>
    </div>
  </div>

  <!-- Day Modal -->
  <div class="modal" id="dayModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Select Slot</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="date-info" id="dateInfo"></div>
      <div class="slots-list" id="slotsList"></div>
    </div>
  </div>

  <!-- Booking Modal -->
  <div class="modal" id="bookingModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Book Slot</h2>
        <button class="close-btn" onclick="closeBookingModal()">✕</button>
      </div>
      <div class="date-info" id="bookingDateInfo"></div>
      <form class="booking-form" id="bookingForm" onsubmit="submitBooking(event)">
        <label>Your Name</label>
        <input type="text" id="bookingName" placeholder="Enter your name" required>
        <label>Department</label>
        <select id="bookingDept" required>
          <option value="">Select Department</option>
          <option>Marketing</option>
          <option>Sales</option>
          <option>Operations</option>
          <option>Creative</option>
          <option>Management</option>
        </select>
        <label>Content Description</label>
        <textarea id="bookingDesc" placeholder="Describe the content..." required></textarea>
        <button type="submit" class="submit-btn">Submit Booking</button>
      </form>
    </div>
  </div>

  <!-- Booked Detail Modal -->
  <div class="modal" id="bookedModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Booking Details</h2>
        <button class="close-btn" onclick="closeBookedModal()">✕</button>
      </div>
      <div id="bookedDetails"></div>
    </div>
  </div>

  <script src="js/supabase-api.js"></script>
  <script>
    let currentDate = new Date();
    let calendarData = {};
    let selectedSlot = null;

    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    const SEASONAL_DATES = {
      '02-14': '💝 Valentine\'s Day',
      '04-14': '🎊 Sinhala New Year',
      '04-15': '🎊 Sinhala New Year',
      '05-01': '👷 May Day',
      '12-25': '🎄 Christmas',
      '12-31': '🎆 New Year\'s Eve',
    };

    function changeMonth(dir) {
      currentDate.setMonth(currentDate.getMonth() + dir);
      renderCalendar();
      loadCalendarData();
    }

    async function loadCalendarData() {
      try {
        const year  = currentDate.getFullYear();
        const month = currentDate.getMonth() + 1;
        const data  = await getContentCalendar(year, month);
        calendarData = {};
        (data || []).forEach(item => {
          const key = item.date;
          if (!calendarData[key]) calendarData[key] = [];
          calendarData[key].push(item);
        });
        renderCalendar();
      } catch(e) {
        console.error('Calendar load error:', e);
      }
    }

    function renderCalendar() {
      const year  = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('monthDisplay').textContent = MONTHS[month] + ' ' + year;

      const grid    = document.getElementById('calendarGrid');
      const headers = grid.querySelectorAll('.day-header');
      grid.innerHTML = '';
      headers.forEach(h => grid.appendChild(h.cloneNode(true)));

      const firstDay    = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrev  = new Date(year, month, 0).getDate();

      // Previous month padding
      for (let i = firstDay - 1; i >= 0; i--) {
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        cell.innerHTML = '<div class="day-number">' + (daysInPrev - i) + '</div>';
        grid.appendChild(cell);
      }

      // Current month days
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr   = year + '-' + String(month + 1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        const mmdd      = String(month + 1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        const isSeasonal = SEASONAL_DATES[mmdd];
        const slots     = calendarData[dateStr] || [];
        const isBooked  = slots.length >= 3;

        const cell = document.createElement('div');
        cell.className = 'day-cell' + (isSeasonal ? ' seasonal' : '') + (isBooked ? ' fully-booked' : '');

        let html = (isBooked ? '<div class="fully-booked-badge">FULL</div>' : '');
        html += '<div class="day-number">' + d + '</div>';
        if (isSeasonal) html += '<div class="day-theme">' + isSeasonal + '</div>';

        slots.slice(0, 3).forEach(s => {
          const statusClass = (s.status || 'pending').toLowerCase();
          html += '<div class="slot-preview ' + statusClass + '" onclick="showBookedDetail(event, \'' + s.id + '\')">' +
            '<span class="slot-code">' + (s.platform || '') + (s.content_type ? ' · ' + s.content_type : '') + '</span>' +
          '</div>';
        });

        if (!isBooked) {
          html += '<div class="slot-preview" style="cursor:pointer;opacity:0.4;" onclick="openBookingModal(\'' + dateStr + '\', ' + slots.length + ')">+ Add</div>';
        }

        cell.innerHTML = html;
        grid.appendChild(cell);
      }

      // Next month padding
      const totalCells = firstDay + daysInMonth;
      const remaining  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let i = 1; i <= remaining; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        cell.innerHTML = '<div class="day-number">' + i + '</div>';
        grid.appendChild(cell);
      }
    }

    function openBookingModal(dateStr, slotIndex) {
      selectedSlot = { dateStr, slotIndex };
      const d = new Date(dateStr);
      document.getElementById('bookingDateInfo').innerHTML =
        '<h3>' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + '</h3>' +
        '<p>Slot #' + (slotIndex + 1) + '</p>';
      document.getElementById('bookingModal').style.display = 'flex';
    }

    function closeModal()        { document.getElementById('dayModal').style.display = 'none'; }
    function closeBookingModal() { document.getElementById('bookingModal').style.display = 'none'; }
    function closeBookedModal()  { document.getElementById('bookedModal').style.display = 'none'; }

    async function submitBooking(e) {
      e.preventDefault();
      if (!selectedSlot) return;
      const payload = {
        date:         selectedSlot.dateStr,
        slot_number:  selectedSlot.slotIndex + 1,
        booked_by:    document.getElementById('bookingName').value,
        department:   document.getElementById('bookingDept').value,
        description:  document.getElementById('bookingDesc').value,
        status:       'pending',
        platform:     'Social Media',
        content_type: 'Post'
      };
      try {
        document.getElementById('loading').style.display = 'flex';
        await createContentCalendarEntry(payload);
        document.getElementById('loading').style.display = 'none';
        closeBookingModal();
        document.getElementById('bookingForm').reset();
        await loadCalendarData();
        alert('Booking submitted successfully!');
      } catch(err) {
        document.getElementById('loading').style.display = 'none';
        alert('Error: ' + err.message);
      }
    }

    async function showBookedDetail(e, id) {
      e.stopPropagation();
      const allSlots = Object.values(calendarData).flat();
      const slot = allSlots.find(s => s.id == id);
      if (!slot) return;
      const statusColors = { booked: '#4CAF50', pending: '#FFC107', rejected: '#dc3545' };
      const color = statusColors[(slot.status || 'pending').toLowerCase()] || '#999';
      document.getElementById('bookedDetails').innerHTML =
        '<div class="booked-detail">' +
          '<div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">' + slot.date + '</span></div>' +
          '<div class="detail-row"><span class="detail-label">Platform</span><span class="detail-value">' + (slot.platform || 'N/A') + '</span></div>' +
          '<div class="detail-row"><span class="detail-label">Booked by</span><span class="detail-value">' + (slot.booked_by || 'N/A') + '</span></div>' +
          '<div class="detail-row"><span class="detail-label">Department</span><span class="detail-value">' + (slot.department || 'N/A') + '</span></div>' +
          '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" style="color:' + color + '">' + (slot.status || 'pending') + '</span></div>' +
          '<div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">' + (slot.description || 'N/A') + '</span></div>' +
        '</div>';
      document.getElementById('bookedModal').style.display = 'flex';
    }

    // Init
    loadCalendarData();
  </script>
</body>
</html>
